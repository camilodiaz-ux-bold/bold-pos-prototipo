<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>BoldPOS — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    /* ─── Merlin Design Tokens ─── */
    :root {
      --blue-100:           #121e6c;
      --blue-30:            #babdd3;
      --blue-10:            #f1f2f6;
      --coral-100:          #ff2947;
      --coral-60:           #ffb2bc;
      --coral-30:           #ffdfe4;
      --black-0:            #ffffff;
      --black-10:           #f3f3f3;
      --black-40:           #969696;
      --black-60:           #606060;
      --black-100:          #1e1e1e;
      --background-page:    #f7f8fb;
      --feedback-error-150: #910022;
      --font-family-main:   'Montserrat', sans-serif;
      --font-size-xxs:      12px;
      --font-size-xs:       14px;
      --font-size-s:        16px;
      --font-height-xxs:    16px;
      --font-height-xs:     20px;
      --font-height-s:      24px;
      --radius-pill:        100px;
      --radius-card:        16px;
      --radius-input:       12px;
      --radius-action-btn:  12px;
      --shadow-blue-8:      0px 8px 20px rgba(18, 30, 108, 0.08);
      --shadow-card:        0px 4px 12px rgba(18, 30, 108, 0.08);
      --gradient-brand:     linear-gradient(270deg, #95345b 13.86%, #4f2864 83.33%);
    }

    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font-family-main);
      background: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 0;
    }

    /* ─── Phone Shell (393px viewport) ─── */
    .phone-shell {
      width: 393px;
      min-height: 100vh;
      background: var(--background-page);
      position: relative;
      overflow: hidden;
      overflow-y: auto;
    }

    /* ─── Status Bar ─── */
    .status-bar {
      height: 20px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px 0 8px;
      overflow: hidden;
    }
    .status-bar .sb-left {
      font-size: 11px;
      font-weight: 600;
      color: var(--black-100);
      font-family: 'Montserrat', sans-serif;
      letter-spacing: -0.02px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .status-bar .sb-center {
      font-size: 12px;
      font-weight: 600;
      color: var(--black-100);
      font-family: 'Montserrat', sans-serif;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .status-bar .sb-right {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: auto;
    }
    .sb-icon { display: flex; align-items: center; }

    /* ─── App Header / Nav Bar ─── */
    .app-header {
      background: transparent;
      border-radius: 0 0 24px 24px;
      padding: 16px 16px 12px 16px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* Avatar */
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-pill);
      background: var(--gradient-brand);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .avatar span {
      font-size: var(--font-size-s);
      font-weight: 500;
      color: var(--black-0);
      line-height: var(--font-height-s);
      letter-spacing: 0.5px;
    }

    /* BoldPOS Logo */
    .logo-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .logo-svg { display: block; }

    /* Help button */
    .help-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-pill);
      background: var(--black-0);
      box-shadow: var(--shadow-card);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      border: none;
    }

    /* ─── Main Content ─── */
    .main-content {
      padding: 16px 16px 120px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ─── Business Info ─── */
    .business-info { display: flex; flex-direction: column; gap: 2px; }
    .business-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--black-100);
      line-height: var(--font-height-s);
    }
    .business-branch {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    .business-branch span {
      font-size: 14px;
      font-weight: 500;
      color: var(--black-60);
      line-height: var(--font-height-xs);
    }
    .chevron-down { display: flex; align-items: center; flex-shrink: 0; }

    /* ─── Sales Card ─── */
    .sales-card {
      background: var(--black-0);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 24px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .sales-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--black-100);
      line-height: var(--font-height-xs);
    }
    .sales-value-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 2px;
    }
    .sales-amount {
      font-size: 28px;
      font-weight: 700;
      color: var(--black-100);
      line-height: 36px;
      white-space: nowrap;
    }
    .eye-icon { display: flex; align-items: center; cursor: pointer; }

    /* Action button (tertiary, 40px) */
    .btn-action {
      height: 40px;
      background: var(--blue-10);
      border-radius: var(--radius-action-btn);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 16px;
      cursor: pointer;
      width: 100%;
    }
    .btn-action span {
      font-size: var(--font-size-xs);
      font-weight: 700;
      color: var(--blue-100);
      line-height: var(--font-height-xs);
      white-space: nowrap;
    }

    /* ─── Tools Section ─── */
    .tools-section { display: flex; flex-direction: column; gap: 16px; }
    .tools-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--blue-100);
      line-height: var(--font-height-s);
    }
    .tools-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* Tool Card */
    .tool-card {
      background: var(--black-0);
      border-radius: var(--radius-card);
      min-height: 76px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      gap: 2px;
      cursor: pointer;
      box-shadow: var(--shadow-card);
      transition: opacity 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .tool-card:active { opacity: 0.7; }
    .tool-card-icon {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .tool-card-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--black-100);
      line-height: 16px;
      font-family: var(--font-family-main);
      text-align: center;
    }

    /* ─── Floating CTA ─── */
    .fab-wrap {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 393px;
      padding: 24px 16px 32px 16px;
      background: linear-gradient(to top, var(--background-page) 55%, rgba(247,248,251,0) 100%);
      display: flex;
      justify-content: center;
      z-index: 200;
      pointer-events: none;
    }
    .btn-nueva-venta {
      height: 48px;
      background: var(--coral-100);
      border-radius: var(--radius-pill);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 12px 32px;
      cursor: pointer;
      width: 100%;
      max-width: 343px;
      pointer-events: all;
      box-shadow: none;
      transition: opacity 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-nueva-venta:active { opacity: 0.85; }
    .btn-nueva-venta span {
      font-size: var(--font-size-s);
      font-weight: 700;
      color: var(--black-0);
      line-height: var(--font-height-xs);
    }

    /* ─── Tool icon placeholder ─── */
    /* Círculo 32×32 con gradiente brand — placeholder hasta íconos definitivos */
    /* Estilos ya aplicados en .tool-card-icon via background: var(--gradient-brand) */
  </style>
</head>
<body>
<div class="phone-shell">

  <!-- ══ STATUS BAR ══ -->
  <div class="status-bar">
    <div class="sb-left">
      <!-- Signal -->
      <svg width="17" height="10" viewBox="0 0 17 10" fill="none" aria-hidden="true">
        <rect x="0" y="6" width="3" height="4" rx="0.5" fill="#1e1e1e"/>
        <rect x="4.5" y="4" width="3" height="6" rx="0.5" fill="#1e1e1e"/>
        <rect x="9" y="2" width="3" height="8" rx="0.5" fill="#1e1e1e"/>
        <rect x="13.5" y="0" width="3" height="10" rx="0.5" fill="#1e1e1e"/>
      </svg>
      <!-- Wifi -->
      <svg width="16" height="11" viewBox="0 0 16 11" fill="none" aria-hidden="true">
        <path d="M8 8.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z" fill="#1e1e1e"/>
        <path d="M3.5 6a6.5 6.5 0 0 1 9 0" stroke="#1e1e1e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path d="M1 3.5a10 10 0 0 1 14 0" stroke="#1e1e1e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      </svg>
      <span style="margin-left:2px;">Carrier</span>
    </div>
    <div class="sb-center">9:41</div>
    <div class="sb-right">
      <!-- Battery -->
      <svg width="27" height="12" viewBox="0 0 27 12" fill="none" aria-hidden="true">
        <rect x="0.5" y="0.5" width="22" height="11" rx="3.5" stroke="#1e1e1e" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="18" height="8" rx="2" fill="#1e1e1e"/>
        <path d="M23.5 4v4a2 2 0 0 0 0-4z" fill="#1e1e1e" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- ══ APP HEADER ══ -->
  <div class="app-header">
    <!-- Avatar RD -->
    <div class="avatar" aria-label="Perfil TS">
      <span>TS</span>
    </div>

    <!-- BoldPOS Logo (wordmark SVG) -->
    <div class="logo-wrap">
      <svg class="logo-svg" width="72" height="14" viewBox="0 0 72 14" fill="none" aria-label="BoldPOS">
        <!-- B -->
        <path d="M2 1h4.5C8.4 1 9.5 2 9.5 3.5c0 .9-.4 1.6-1.1 2 .9.4 1.5 1.2 1.5 2.2C9.9 9.4 8.7 10.5 6.7 10.5H2V1zm1.6 4.2h2.7c.9 0 1.5-.5 1.5-1.3s-.6-1.3-1.5-1.3H3.6v2.6zm0 3.8h3c1 0 1.6-.6 1.6-1.4 0-.9-.6-1.4-1.6-1.4H3.6V9z" fill="#121e6c"/>
        <!-- o -->
        <path d="M12 6.5c0-2.3 1.6-4 4-4s4 1.7 4 4-1.6 4-4 4-4-1.7-4-4zm6.4 0c0-1.5-.9-2.5-2.4-2.5s-2.4 1-2.4 2.5.9 2.5 2.4 2.5 2.4-1 2.4-2.5z" fill="#121e6c"/>
        <!-- l -->
        <path d="M22 1h1.6v9.5H22V1z" fill="#121e6c"/>
        <!-- d -->
        <path d="M26 6.5c0-2.3 1.5-4 3.8-4 .9 0 1.7.3 2.2.9V1H33.6v9.5H32v-.9c-.5.6-1.3 1-2.3 1-2.2 0-3.7-1.7-3.7-4zm6.1 0c0-1.5-.9-2.5-2.2-2.5-1.4 0-2.2 1-2.2 2.5s.8 2.5 2.2 2.5c1.3 0 2.2-1 2.2-2.5z" fill="#121e6c"/>
        <!-- P -->
        <path d="M36 1h4.2c2.1 0 3.4 1.2 3.4 3.1S42.3 7.2 40.2 7.2h-2.6v3.3H36V1zm1.6 4.7h2.4c1.1 0 1.9-.6 1.9-1.6s-.7-1.6-1.9-1.6h-2.4v3.2z" fill="#121e6c"/>
        <!-- O -->
        <path d="M44.5 5.8C44.5 3 46.3 1 49 1s4.5 2 4.5 4.8-1.8 4.8-4.5 4.8-4.5-2-4.5-4.8zm7.3 0c0-2-1.1-3.3-2.8-3.3s-2.8 1.3-2.8 3.3 1.1 3.3 2.8 3.3 2.8-1.3 2.8-3.3z" fill="#121e6c"/>
        <!-- S -->
        <path d="M54.5 8.7l1-.9c.6.8 1.5 1.3 2.6 1.3 1.1 0 1.8-.5 1.8-1.3 0-.8-.6-1.1-2-1.5-1.7-.5-3-.9-3-2.7C54.9 2 56.3 1 58.2 1c1.3 0 2.4.5 3.1 1.3l-1 .9c-.6-.7-1.3-1-2.2-1-.9 0-1.5.5-1.5 1.1 0 .8.7 1 2.1 1.5 1.7.5 2.9 1 2.9 2.8 0 1.8-1.4 3-3.4 3-1.5 0-2.9-.6-3.7-1.9z" fill="#121e6c"/>
      </svg>
    </div>

    <!-- Help Button -->
    <button class="help-btn" aria-label="Ayuda">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="10" stroke="#121e6c" stroke-width="1.5" fill="none"/>
        <path d="M9.5 9.5c0-1.4 1.1-2.5 2.5-2.5s2.5 1.1 2.5 2.5c0 1-0.6 1.8-1.5 2.2-.4.2-.5.5-.5.8v.5" stroke="#121e6c" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <circle cx="12" cy="17" r="1" fill="#121e6c"/>
      </svg>
    </button>
  </div>

  <!-- ══ MAIN CONTENT ══ -->
  <main class="main-content">

    <!-- Business Info -->
    <section class="business-info" aria-label="Negocio seleccionado">
      <p class="business-name">Tienda Sport</p>
      <div class="business-branch" role="button" aria-haspopup="listbox" aria-label="Cambiar sede">
        <span>Sucursal Principal</span>
        <div class="chevron-down" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M4 6l4 4 4-4" stroke="#121e6c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </section>

    <!-- Sales Card -->
    <article class="sales-card" aria-label="Resumen de ventas del día">
      <div>
        <p class="sales-label">Tus ventas de hoy</p>
        <div class="sales-value-row">
          <span class="sales-amount">$166.170.900</span>
          <div class="eye-icon" role="button" aria-label="Ocultar monto" aria-pressed="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M3 3l18 18M10.5 10.5A3 3 0 0 0 13.5 13.5M6.7 6.7C4.6 8 3 10 3 12c0 3.3 4.1 7 9 7 2 0 3.8-.6 5.3-1.7M9.5 5.1C10.3 5 11.1 5 12 5c4.9 0 9 3.7 9 7 0 1.1-.4 2.2-1 3.1" stroke="#121e6c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>
      <button class="btn-action" aria-label="Ver informe completo de ventas">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2" stroke="#121e6c" stroke-width="1.5" fill="none"/>
          <path d="M7 15l3-3 3 3 4-5" stroke="#121e6c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Ver informe completo</span>
      </button>
    </article>

    <!-- Tools Grid -->
    <section class="tools-section" aria-label="Herramientas">
      <h2 class="tools-title">Herramientas</h2>
      <div class="tools-grid" role="list">

        <!-- Shared gradient for all icons -->
        <svg width="0" height="0" style="position:absolute;overflow:hidden;" aria-hidden="true">
          <defs>
            <linearGradient id="ic-grad" x1="1" y1="0.5" x2="0" y2="0.5" gradientUnits="objectBoundingBox">
              <stop offset="13.86%" stop-color="#95345b"/>
              <stop offset="83.33%" stop-color="#4f2864"/>
            </linearGradient>
          </defs>
        </svg>

        <!-- 1. Productos del menú -->
        <div class="tool-card" role="listitem button" aria-label="Productos del menú" tabindex="0">
          <div class="tool-card-icon" aria-hidden="true">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none">
              <path fill="url(#ic-grad)" fill-rule="evenodd" d="M5 2a2 2 0 00-2 2v16a2 2 0 002 2h14a2 2 0 002-2V4a2 2 0 00-2-2H5zm2 4h10a1 1 0 110 2H7a1 1 0 010-2zm0 4h10a1 1 0 110 2H7a1 1 0 010-2zm0 4h6a1 1 0 110 2H7a1 1 0 010-2z"/>
            </svg>
          </div>
          <span class="tool-card-label">Productos del menú</span>
        </div>

        <!-- 2. Ventas -->
        <div class="tool-card" role="listitem button" aria-label="Ventas" tabindex="0">
          <div class="tool-card-icon" aria-hidden="true">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none">
              <path fill="url(#ic-grad)" fill-rule="evenodd" d="M5 2a1 1 0 00-1 1v18a1 1 0 001.45.89L9 20.38l3.55 1.51a1 1 0 00.78 0L17 20.38l2.55 1.51A1 1 0 0021 21V3a1 1 0 00-1-1H5zm3 4h8a1 1 0 110 2H8a1 1 0 010-2zm0 4h8a1 1 0 110 2H8a1 1 0 010-2zm0 4h4a1 1 0 110 2H8a1 1 0 010-2z"/>
            </svg>
          </div>
          <span class="tool-card-label">Ventas</span>
        </div>

        <!-- 3. Informe del negocio -->
        <div class="tool-card" role="listitem button" aria-label="Informe del negocio" tabindex="0">
          <div class="tool-card-icon" aria-hidden="true">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none">
              <path fill="url(#ic-grad)" d="M5 14a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H6a1 1 0 01-1-1v-5zm5-5a1 1 0 011-1h2a1 1 0 011 1v10a1 1 0 01-1 1h-2a1 1 0 01-1-1V9zm5-4a1 1 0 011-1h2a1 1 0 011 1v14a1 1 0 01-1 1h-2a1 1 0 01-1-1V5z"/>
            </svg>
          </div>
          <span class="tool-card-label">Informe del negocio</span>
        </div>

        <!-- 4. Facturas de venta -->
        <div class="tool-card" role="listitem button" aria-label="Facturas de venta" tabindex="0">
          <div class="tool-card-icon" aria-hidden="true">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none">
              <path fill="url(#ic-grad)" fill-rule="evenodd" d="M6 2a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6H6zm7 1.5V8h4.5L13 3.5zM8 11a1 1 0 000 2h8a1 1 0 100-2H8zm0 4a1 1 0 000 2h5a1 1 0 100-2H8z"/>
            </svg>
          </div>
          <span class="tool-card-label">Facturas de venta</span>
        </div>

        <!-- 5. Recibos -->
        <div class="tool-card" role="listitem button" aria-label="Recibos" tabindex="0">
          <div class="tool-card-icon" aria-hidden="true">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none">
              <path fill="url(#ic-grad)" d="M21.41 11.58l-9-9A2 2 0 0011 2H4a2 2 0 00-2 2v7a2 2 0 00.59 1.41l9 9A2 2 0 0013 22a2 2 0 001.41-.59l7-7A2 2 0 0022 13a2 2 0 00-.59-1.42zM6.5 8a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/>
            </svg>
          </div>
          <span class="tool-card-label">Recibos</span>
        </div>

        <!-- 6. Gastos -->
        <div class="tool-card" role="listitem button" aria-label="Gastos" tabindex="0">
          <div class="tool-card-icon" aria-hidden="true">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none">
              <path fill="url(#ic-grad)" fill-rule="evenodd" d="M21 7H5a1 1 0 010-2h14V3a1 1 0 00-1-1H5C3.34 2 2 3.34 2 5v14a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-1-2zm-3 8.5a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/>
            </svg>
          </div>
          <span class="tool-card-label">Gastos</span>
        </div>

        <!-- 7. Contactos -->
        <div class="tool-card" role="listitem button" aria-label="Contactos" tabindex="0">
          <div class="tool-card-icon" aria-hidden="true">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none">

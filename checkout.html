<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>BoldPOS — Método de cobro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:   #121e6c;
      --blue10: #f1f2f6;
      --coral:  #ff2947;
      --white:  #ffffff;
      --g40:    #969696;
      --g60:    #606060;
      --black:  #1e1e1e;
      --bg:     #f7f8fb;
      --font:   'Montserrat', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: var(--font); background: #d0d0d0; display: flex; justify-content: center; }
    #app { width: 393px; height: 100vh; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; position: relative; }

    /* ── Status bar ── */
    #sb  { flex-shrink:0; display:flex; align-items:center; padding:8px 8px 0; }
    .sbl { display:flex; align-items:center; gap:4px; font-size:11px; font-weight:600; color:var(--black); }
    .sbr { margin-left:auto; display:flex; align-items:center; }

    /* ── Header — App/Title/Bold 18px ── */
    #hdr { flex-shrink:0; display:flex; align-items:center; gap:8px; padding:0 12px; height:56px; }
    .hbtn { width:24px; height:24px; border:none; background:transparent; cursor:pointer; padding:0; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; flex-shrink:0; border-radius:6px; transition:background .12s; }
    .hbtn:active { background:var(--blue10); }
    #htitle { flex:1; text-align:center; font-size:18px; font-weight:700; color:var(--blue); line-height:24px; }
    .hsp { width:24px; flex-shrink:0; }

    /* ── Scrollable body ── */
    #body { flex:1; overflow-y:auto; padding:14px 16px 100px; display:flex; flex-direction:column; gap:24px; scrollbar-width:none; }
    #body::-webkit-scrollbar { display:none; }

    /* ── Total card — white rounded-16 pad 12/16 ── */
    /* Figma: bg-white rounded-[16px] px-[16px] py-[12px] gap-[16px] */
    #total-card { background:var(--white); border-radius:16px; padding:12px 16px; display:flex; flex-direction:column; gap:16px; }
    /* [APP]/Caption/Regular: 12px 400 lh16 */
    .tc-lbl { font-size:12px; font-weight:400; color:var(--black); line-height:16px; }
    /* Numeric/Small/Regular: 24px 400 lh28 */
    .tc-amt { font-size:24px; font-weight:400; color:var(--black); line-height:28px; margin-top:4px; }
    .tc-rows { display:flex; flex-direction:column; gap:4px; }
    .tc-row  { display:flex; align-items:center; height:16px; }
    /* Caption/Regular */
    .tc-rlbl { flex:1; font-size:12px; font-weight:400; color:var(--black); line-height:16px; }
    /* Caption/medium */
    .tc-rval { font-size:12px; font-weight:500; color:var(--black); line-height:16px; }
    /* Link/Small: Semibold 12px Blue/100 underline */
    .tc-link { font-size:12px; font-weight:600; color:var(--blue); text-decoration:underline; text-underline-offset:2px; cursor:pointer; background:none; border:none; font-family:var(--font); padding:0; }

    /* ── Section ── */
    .section { display:flex; flex-direction:column; gap:16px; }
    /* Section header row */
    .sec-hdr { display:flex; align-items:center; justify-content:space-between; height:29px; }
    /* Medium 12px #606060 */
    .sec-title { font-size:12px; font-weight:500; color:var(--g60); line-height:16px; }
    /* + Agregar button */
    .btn-add  { display:flex; align-items:center; gap:8px; border:none; background:transparent; cursor:pointer; padding:4px 0; -webkit-tap-highlight-color:transparent; }
    .btn-add:active { opacity:.7; }
    /* Semibold 12px coral underline */
    .btn-add-lbl { font-size:12px; font-weight:600; color:var(--coral); text-decoration:underline; text-underline-offset:2px; line-height:16px; white-space:nowrap; }

    .rows-list { display:flex; flex-direction:column; gap:16px; }

    /* ── Pay row — Figma: flex gap-[16px] items-end ── */
    .pay-row       { display:flex; gap:16px; align-items:flex-end; width:100%; }
    /* inner: flex flex:1 gap-[12px] items-center */
    .pay-row-inner { flex:1; min-width:0; display:flex; gap:12px; align-items:flex-end; }

    /* ── MERLin input field — label + pill ── */
    .ml-field { flex:1; min-width:0; display:flex; flex-direction:column; gap:4px; }
    /* [APP]/Body/Semibold: 14px 600 Blue/100 lh20 */
    .ml-lbl { font-size:14px; font-weight:600; color:var(--blue); line-height:20px; }
    /* .atom/text_input_fields: white 40px rounded-12 pad 8/12 gap 12 */
    .ml-pill {
      height:40px; background:var(--white); border-radius:12px;
      padding:8px 12px; display:flex; align-items:center; gap:12px;
      border:none; cursor:pointer; width:100%; text-align:left;
      -webkit-tap-highlight-color:transparent; transition:opacity .15s;
    }
    .ml-pill:active { opacity:.85; }
    .ml-pill.editable { cursor:default; }
    /* [APP]/Body/Medium: 14px 500 Black/100 lh20 */
    .ml-val { flex:1; font-size:14px; font-weight:500; color:var(--black); line-height:20px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .ml-native {
      flex:1; border:none; background:transparent; font-family:var(--font);
      font-size:14px; font-weight:500; color:var(--black); line-height:20px;
      outline:none; width:0; min-width:0; padding:0;
    }

    /* Trash */
    .btn-trash { width:24px; height:24px; flex-shrink:0; border:none; background:transparent; cursor:pointer; padding:0; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; }
    .btn-trash:active { opacity:.6; }

    /* Divider */
    .divider { height:1px; background:#EEF0F8; flex-shrink:0; }

    /* ── Footer — Figma: backdrop-blur pad 20/16 ── */
    #footer {
      position:absolute; bottom:0; left:0; right:0; z-index:100;
      background:rgba(247,248,251,.2);
      backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
      display:flex; align-items:center; padding:20px 16px; gap:12px;
    }
    #ft-left { flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; }
    /* Caption/Regular 12px #606060 */
    .ft-lbl { font-size:12px; font-weight:400; color:var(--g60); line-height:16px; }
    /* Body/Medium 16px Black/100 */
    .ft-val { font-size:16px; font-weight:500; color:var(--black); line-height:20px; }
    .ft-val.missing { color:var(--coral); }
    /* Tip coverage warning — Figma 26975:6680 (WEB/APP Alert warning) */
    #tip-warning {
      display:none; background:#fff3d1; border:1px solid #ffc217; border-radius:16px;
      padding:12px; gap:12px; align-items:center;
      font-size:12px; font-weight:400; color:#1e1e1e; line-height:16px;
    }
    #tip-warning.show { display:flex; }
    /* Cobrar button: coral 48px radius-100 Bold 14px white 174px */
    #btn-cobrar {
      width:174px; height:48px; border-radius:100px;
      background:var(--coral); border:none;
      font-family:var(--font); font-size:14px; font-weight:700; color:var(--white);
      cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center;
      white-space:nowrap; transition:opacity .15s; -webkit-tap-highlight-color:transparent;
    }
    #btn-cobrar:active:not(.disabled) { opacity:.85; }
    #btn-cobrar.disabled { opacity:.5; cursor:not-allowed; pointer-events:none; }
    .spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── Bottom sheet ── */
    #bsco-ov { display:none; position:absolute; inset:0; z-index:400; background:rgba(0,0,0,.5); align-items:flex-end; }
    #bsco-ov.show { display:flex; }
    #bsco-sheet {
      width:100%; background:var(--white); border-radius:32px 32px 0 0;
      max-height:90%; display:flex; flex-direction:column;
      box-shadow:0px -4px 8px rgba(0,0,0,.12);
      transform:translateY(100%); transition:transform 250ms ease;
    }
    #bsco-ov.show #bsco-sheet { transform:translateY(0); }
    .bs-handle { width:48px; height:4px; background:#DADADA; border-radius:4px; margin:12px auto 0; flex-shrink:0; }
    .bs-hdr    { display:flex; align-items:center; height:56px; padding:0 16px; flex-shrink:0; }
    .bs-nav    { width:24px; height:24px; flex-shrink:0; border:none; background:transparent; cursor:pointer; padding:0; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; }
    .bs-nav:active { opacity:.6; }
    .bs-title  { flex:1; text-align:center; font-size:16px; font-weight:700; color:var(--blue); line-height:24px; }
    .bs-body   { overflow-y:auto; padding:16px; flex:1; scrollbar-width:none; }
    .bs-body::-webkit-scrollbar { display:none; }
    .bs-grid   { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .bs-card   { background:#f7f8fb; border-radius:16px; height:108px; padding:12px 16px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; border:none; cursor:pointer; width:100%; -webkit-tap-highlight-color:transparent; transition:opacity .15s; }
    .bs-card:active { opacity:.7; }
    .bs-icon   { width:32px; height:32px; border-radius:100px; overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .bs-icon img { width:100%; height:100%; object-fit:contain; display:block; }
    .bs-clbl   { font-size:14px; font-weight:500; color:var(--black); line-height:20px; text-align:center; width:100%; }

    /* Toast */
    #toast { position:absolute; top:60px; left:50%; transform:translateX(-50%) translateY(-8px); width:calc(100% - 32px); max-width:361px; background:var(--black); border-radius:12px; padding:12px 16px; display:flex; align-items:center; gap:10px; z-index:9999; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    #toast-txt  { color:var(--white); font-size:14px; font-weight:500; line-height:20px; }
  </style>
</head>
<body>
<div id="app">

  <!-- Status bar -->
  <div id="sb">
    <div class="sbl"><span id="sb-time">9:41</span></div>
    <div class="sbr">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="8" width="3" height="4" rx="1" fill="#1e1e1e"/>
        <rect x="4.5" y="5.5" width="3" height="6.5" rx="1" fill="#1e1e1e"/>
        <rect x="9" y="3" width="3" height="9" rx="1" fill="#1e1e1e"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="#1e1e1e"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none" style="margin-left:5px">
        <path d="M8 9.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5z" fill="#1e1e1e"/>
        <path d="M8 6.5C9.66 6.5 11.16 7.17 12.25 8.25L13.31 7.19A7 7 0 0 0 8 5a7 7 0 0 0-5.31 2.19l1.06 1.06A5 5 0 0 1 8 6.5z" fill="#1e1e1e"/>
        <path d="M8 3.5c2.48 0 4.73 1 6.36 2.63l1.06-1.06A9.95 9.95 0 0 0 8 2a9.95 9.95 0 0 0-7.42 3.07L1.64 6.13A8 8 0 0 1 8 3.5z" fill="#1e1e1e"/>
      </svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none" style="margin-left:5px">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#1e1e1e" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="16" height="8" rx="2" fill="#1e1e1e"/>
        <path d="M23 4v4a2 2 0 0 0 0-4z" fill="#1e1e1e" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Header -->
  <div id="hdr">
    <button class="hbtn" onclick="goBack()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 18l-6-6 6-6" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span id="htitle">Método de cobro</span>
    <div class="hsp"></div>
  </div>

  <!-- Scrollable body -->
  <div id="body">

    <!-- Total card -->
    <div id="total-card">
      <div>
        <div class="tc-lbl">Total a cobrar</div>
        <div class="tc-amt" id="tc-total">$0</div>
      </div>
      <div class="tc-rows">
        <div class="tc-row">
          <span class="tc-rlbl">Subtotal</span>
          <span class="tc-rval" id="tc-sub">$0</span>
        </div>
        <div class="tc-row">
          <span class="tc-rlbl">Impuesto (19%)</span>
          <span class="tc-rval" id="tc-tax">$0</span>
        </div>
        <div class="tc-row" id="tc-tip-row" style="display:none">
          <span class="tc-rlbl">Propina</span>
          <span class="tc-rval" id="tc-tip-val">$0</span>
        </div>
        <div class="tc-row">
          <span class="tc-rlbl">Descuento <button class="tc-link" onclick="showToast('Próximamente: agregar descuento')">Agregar</button></span>
          <span class="tc-rval">$0</span>
        </div>
      </div>
    </div>

    <!-- Tip coverage warning — Figma 26975:6680 WEB/APP Alert -->
    <div id="tip-warning">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="flex-shrink:0"><circle cx="12" cy="12" r="12" fill="#FFC217"/><path d="M11.1429 14.7147V6.14328C11.1429 5.66989 11.5266 5.28613 12 5.28613C12.4734 5.28613 12.8571 5.66989 12.8571 6.14328V14.7147C12.8571 15.1881 12.4734 15.5718 12 15.5718C11.5266 15.5718 11.1429 15.1881 11.1429 14.7147Z" fill="white"/><path d="M13 17.7147C13 18.267 12.5523 18.7147 12 18.7147C11.4477 18.7147 11 18.267 11 17.7147C11 17.1624 11.4477 16.7147 12 16.7147C12.5523 16.7147 13 17.1624 13 17.7147Z" fill="white"/></svg>
      <span>Agrega un método de cobro del mismo tipo para cobrar la propina.</span>
    </div>

    <!-- Propina section -->
    <div class="section">
      <div class="sec-hdr">
        <span class="sec-title">Propina</span>
        <button class="btn-add" onclick="addTip()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14M5 12h14" stroke="#ff2947" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span class="btn-add-lbl">Agregar Propina</span>
        </button>
      </div>
      <div class="rows-list" id="tips-list"></div>
    </div>

    <div class="divider"></div>

    <!-- Métodos de cobro section -->
    <div class="section">
      <div class="sec-hdr">
        <span class="sec-title">Métodos de cobro</span>
        <button class="btn-add" onclick="addPayment()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14M5 12h14" stroke="#ff2947" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span class="btn-add-lbl">Agregar método</span>
        </button>
      </div>
      <div class="rows-list" id="payments-list"></div>
    </div>

  </div><!-- /body -->

  <!-- Footer -->
  <div id="footer">
    <div id="ft-left">
      <span class="ft-lbl" id="ft-lbl">Cambio</span>
      <span class="ft-val" id="ft-val">$0</span>
    </div>
    <button id="btn-cobrar" class="disabled" onclick="handleCobrar()">Cobrar $0</button>
  </div>

  <!-- Toast -->
  <div id="toast">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
      <circle cx="12" cy="12" r="10" fill="#10B981"/>
      <path d="M7 12l3 3 7-7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span id="toast-txt"></span>
  </div>

  <!-- Bottom sheet de métodos -->
  <div id="bsco-ov" onclick="handleBscoOv(event)">
    <div id="bsco-sheet">
      <div class="bs-handle"></div>
      <div class="bs-hdr">
        <button class="bs-nav" onclick="closeBsco()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M15 18l-6-6 6-6" stroke="#121e6c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="bs-title">Agregar método de cobro</span>
        <button class="bs-nav" onclick="closeBsco()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6l12 12" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="bs-body">
        <div class="bs-grid">
          <button class="bs-card" onclick="selectMethod('bold')">
            <div class="bs-icon"><img src="https://www.figma.com/api/mcp/asset/13a861f8-be57-434d-91d9-a17d7c2f72af" alt="Bold"></div>
            <span class="bs-clbl">Bold</span>
          </button>
          <button class="bs-card" onclick="selectMethod('efectivo')">
            <div class="bs-icon"><img src="https://www.figma.com/api/mcp/asset/6f562da4-c32f-4538-85b0-69db817f5e18" alt="Efectivo"></div>
            <span class="bs-clbl">Efectivo</span>
          </button>
          <button class="bs-card" onclick="selectMethod('nequi')">
            <div class="bs-icon"><img src="https://www.figma.com/api/mcp/asset/14148419-f7ac-4760-8669-e016c808c5b0" alt="Nequi"></div>
            <span class="bs-clbl">Nequi</span>
          </button>
          <button class="bs-card" onclick="selectMethod('daviplata')">
            <div class="bs-icon"><img src="https://www.figma.com/api/mcp/asset/2189929e-8f34-4b06-bac0-295edd188051" alt="Daviplata"></div>
            <span class="bs-clbl">Daviplata</span>
          </button>
          <button class="bs-card" onclick="selectMethod('credibanco')">
            <div class="bs-icon"><img src="https://www.figma.com/api/mcp/asset/3daa974d-ce06-4bb4-bffa-a98bcf3bee8b" alt="Credibanco"></div>
            <span class="bs-clbl">Credibanco</span>
          </button>
          <button class="bs-card" onclick="selectMethod('redeban')">
            <div class="bs-icon"><img src="https://www.figma.com/api/mcp/asset/d43389f5-3bd8-471d-83b6-f179df323a3a" alt="Redeban"></div>
            <span class="bs-clbl">Redeban</span>
          </button>
          <button class="bs-card" onclick="selectMethod('addi')">
            <div class="bs-icon"><img src="https://www.figma.com/api/mcp/asset/53d0faff-d817-4a0b-9b25-a07e7c632c7a" alt="Addi"></div>
            <span class="bs-clbl">Addi</span>
          </button>
          <button class="bs-card" onclick="selectMethod('sistecredito')">
            <div class="bs-icon" style="background:#6ac648"><img src="https://www.figma.com/api/mcp/asset/0a6925c5-6fdd-4761-a337-814043111437" alt="Sistecredito" style="width:57%;height:57%"></div>
            <span class="bs-clbl">Sistecredito</span>
          </button>
          <button class="bs-card" onclick="selectMethod('otro')">
            <div class="bs-icon"><img src="https://www.figma.com/api/mcp/asset/67d6b6ab-0608-4f58-a04e-f7db5fc04c03" alt="Otro"></div>
            <span class="bs-clbl">Otro</span>
          </button>
          <button class="bs-card" onclick="selectMethod('transferencia')">
            <div class="bs-icon"><img src="https://www.figma.com/api/mcp/asset/ca31695d-d904-49ea-8167-8a13060a5b99" alt="Transferencia"></div>
            <span class="bs-clbl">Transferencia bancaria</span>
          </button>
          <button class="bs-card" onclick="selectMethod('intercambio')">
            <div class="bs-icon"><img src="https://www.figma.com/api/mcp/asset/f6551e2c-10df-4ca8-816b-dbcdf107a572" alt="Intercambio"></div>
            <span class="bs-clbl">Intercambio</span>
          </button>
          <button class="bs-card" onclick="selectMethod('pago_contra_entrega')">
            <div class="bs-icon"><img src="https://www.figma.com/api/mcp/asset/f003d697-472a-4b2b-8b7d-47d3fe94afc7" alt="Pago contra entrega"></div>
            <span class="bs-clbl">Pago contra entrega</span>
          </button>
        </div>
      </div>
    </div>
  </div>

</div><!-- /app -->

<script src="data-manager.js"></script>
<script>
/* ── URL params ── */
const qp         = new URLSearchParams(location.search);
const mesaId     = qp.get('mesa')   || 'S05';
const zona       = qp.get('zona')   || 'salon';
const initMethod = qp.get('method') || 'efectivo';

/* ── Method display names ── */
const MNAMES = {
  bold:'Bold', efectivo:'Efectivo', nequi:'Nequi', daviplata:'Daviplata',
  credibanco:'Credibanco', redeban:'Redeban', addi:'Addi', sistecredito:'Sistecredito',
  otro:'Otro', transferencia:'Transferencia bancaria', intercambio:'Intercambio',
  pago_contra_entrega:'Pago contra entrega'
};
const mName  = k => MNAMES[k] || k;
const esc    = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt    = n => '$' + Math.round(n || 0).toLocaleString('es-CO');
const uid    = () => Date.now() + '-' + Math.floor(Math.random() * 1e6);

/* ── Load cart from localStorage ── */
let cart = [];
try {
  const ms = JSON.parse(localStorage.getItem('mesa_' + mesaId)) || {};
  cart = ms.productos || [];
} catch(e) {}
if (!cart.length) {
  try {
    DataManager.init();
    const dm = DataManager.getMesa(mesaId);
    cart = (dm && dm.productos) ? dm.productos : [];
  } catch(e) {}
}

const subtotal = cart.reduce((s, p) => s + (p.precio || 0) * (p.cantidad || 1), 0);
const tax      = Math.round(subtotal * 0.19);

/* ── State ── */
let tips     = [];
let payments = [];
let bscoTgt  = null; // { list: 'tips'|'payments', id }

const tipSum = () => tips.reduce((s, t) => s + (t.amount || 0), 0);
const paySum = () => payments.reduce((s, p) => s + (p.amount || 0), 0);
const total  = () => subtotal + tax + tipSum();

/* ── Init ── */
(function init() {
  try { DataManager.init(); } catch(e) {}

  const tipAmt = Math.round(subtotal * 0.10);
  tips     = [{ id: uid(), method: initMethod, amount: tipAmt }];
  // payments set after tips so total() is correct
  payments = [{ id: uid(), method: initMethod, amount: total() }];

  render();
  updateClock();
  setInterval(updateClock, 30000);
})();

/* ── Render ── */
function render() {
  renderLists();
  refreshCard();
  refreshFooter();
}

function renderLists() {
  document.getElementById('tips-list').innerHTML     = buildRows(tips,     'tips');
  document.getElementById('payments-list').innerHTML = buildRows(payments, 'payments');
}

function buildRows(list, listName) {
  const amtLabel = listName === 'tips' ? 'Propina' : 'Monto';
  return list.map((item, idx) => `
    <div class="pay-row">
      <div class="pay-row-inner">
        <div class="ml-field">
          ${idx === 0 ? '<span class="ml-lbl">Método</span>' : ''}
          <button class="ml-pill" onclick="openBsco('${listName}','${item.id}')">
            <span class="ml-val">${esc(mName(item.method))}</span>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
              <path d="M6 9l6 6 6-6" stroke="#121e6c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="ml-field">
          ${idx === 0 ? `<span class="ml-lbl">${esc(amtLabel)}</span>` : ''}
          <div class="ml-pill editable" onclick="this.querySelector('input').focus()">
            <input class="ml-native" type="text" inputmode="numeric"
              value="${esc(fmt(item.amount))}"
              onfocus="this.value=this.value.replace(/[^0-9]/g,'');this.select()"
              oninput="onAmtLive('${listName}','${item.id}',this)"
              onblur="onAmt('${listName}','${item.id}',this)"
            />
          </div>
        </div>
      </div>
      <button class="btn-trash" onclick="removeRow('${listName}','${item.id}')">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M18.9069 4.77615C19.1826 4.791 19.3941 5.02656 19.3793 5.30231L18.5293 21.0914C18.4751 22.1301 17.6126 22.9354 16.58 22.9354H7.36002C6.32263 22.9354 5.46443 22.1157 5.41069 21.0814L4.62064 5.30043C4.60684 5.02463 4.81922 4.78986 5.09502 4.77606C5.37082 4.76225 5.60559 4.97463 5.61939 5.25043L6.40935 21.0295C6.43584 21.5349 6.85756 21.9354 7.36002 21.9354H16.58C17.0873 21.9354 17.5047 21.5405 17.5307 21.0395L18.3807 5.24855C18.3956 4.97281 18.6312 4.76131 18.9069 4.77615Z" fill="#121E6C"/><path fill-rule="evenodd" clip-rule="evenodd" d="M2.27002 5.27543C2.27002 4.99929 2.49388 4.77543 2.77002 4.77543H21.23C21.5062 4.77543 21.73 4.99929 21.73 5.27543C21.73 5.55157 21.5062 5.77543 21.23 5.77543H2.77002C2.49388 5.77543 2.27002 5.55157 2.27002 5.27543Z" fill="#121E6C"/><path fill-rule="evenodd" clip-rule="evenodd" d="M7.84002 3.38543C7.84002 2.0975 8.88567 1.06543 10.16 1.06543H13.96C15.2479 1.06543 16.28 2.11108 16.28 3.38543V5.27543C16.28 5.55157 16.0562 5.77543 15.78 5.77543C15.5039 5.77543 15.28 5.55157 15.28 5.27543V3.38543C15.28 2.65978 14.6921 2.06543 13.96 2.06543H10.16C9.43437 2.06543 8.84002 2.65336 8.84002 3.38543V5.27543C8.84002 5.55157 8.61616 5.77543 8.34002 5.77543C8.06388 5.77543 7.84002 5.55157 7.84002 5.27543V3.38543Z" fill="#121E6C"/><path fill-rule="evenodd" clip-rule="evenodd" d="M8.78688 7.5756C9.06293 7.56834 9.29259 7.78624 9.29985 8.06229L9.59985 19.4723C9.6071 19.7483 9.38921 19.978 9.11316 19.9853C8.83711 19.9925 8.60745 19.7746 8.60019 19.4986L8.30019 8.08857C8.29293 7.81252 8.51083 7.58286 8.78688 7.5756Z" fill="#121E6C"/><path fill-rule="evenodd" clip-rule="evenodd" d="M12 7.57543C12.2762 7.57543 12.5 7.79929 12.5 8.07543V19.4854C12.5 19.7616 12.2762 19.9854 12 19.9854C11.7239 19.9854 11.5 19.7616 11.5 19.4854V8.07543C11.5 7.79929 11.7239 7.57543 12 7.57543Z" fill="#121E6C"/><path fill-rule="evenodd" clip-rule="evenodd" d="M15.2036 7.57561C15.4796 7.58311 15.6973 7.81297 15.6898 8.08901L15.3798 19.499C15.3723 19.775 15.1425 19.9927 14.8664 19.9852C14.5904 19.9777 14.3727 19.7479 14.3802 19.4719L14.6902 8.06185C14.6977 7.78581 14.9276 7.56811 15.2036 7.57561Z" fill="#121E6C"/></svg>
      </button>
    </div>`).join('');
}

function refreshCard() {
  const ts  = tipSum();
  const tot = total();
  document.getElementById('tc-total').textContent = fmt(tot);
  document.getElementById('tc-sub').textContent   = fmt(subtotal);
  document.getElementById('tc-tax').textContent   = fmt(tax);
  const tipRow = document.getElementById('tc-tip-row');
  if (ts > 0) {
    tipRow.style.display = '';
    document.getElementById('tc-tip-val').textContent = fmt(ts);
  } else {
    tipRow.style.display = 'none';
  }
}

/* ── Condición 2: cada propina con monto > 0 debe tener un pago del mismo método
   con monto >= propina ── */
function tipCovered() {
  return tips.every(tip => {
    if (!tip.amount || tip.amount <= 0) return true;
    return payments.some(p => p.method === tip.method && (p.amount || 0) >= tip.amount);
  });
}

function refreshFooter() {
  const tot   = total();
  const ps    = paySum();
  const btn   = document.getElementById('btn-cobrar');
  const lbl   = document.getElementById('ft-lbl');
  const val   = document.getElementById('ft-val');
  const warn  = document.getElementById('tip-warning');
  const sumOk = ps >= tot;
  const tipOk = tipCovered();

  btn.textContent = `Cobrar ${fmt(tot)}`;

  // Alerta de cobertura de propina (condición 2) — Figma 26975:6680
  if (!tipOk && tips.some(t => t.amount > 0)) {
    warn.classList.add('show');
  } else {
    warn.classList.remove('show');
  }

  // Cambio / Falta (condición 1)
  if (!sumOk) {
    lbl.textContent = 'Falta';
    val.textContent = fmt(tot - ps);
    val.className   = 'ft-val missing';
  } else {
    lbl.textContent = 'Cambio';
    val.textContent = fmt(ps - tot);
    val.className   = 'ft-val';
  }

  // Botón: habilitado solo cuando ambas condiciones se cumplen
  if (sumOk && tipOk) {
    btn.classList.remove('disabled');
  } else {
    btn.classList.add('disabled');
  }
}

/* ── Amount input (real-time: updates state + footer without reformatting) ── */
function onAmtLive(listName, id, input) {
  const raw  = parseInt(input.value.replace(/[^0-9]/g, '')) || 0;
  const list = listName === 'tips' ? tips : payments;
  const item = list.find(x => x.id === id);
  if (item) item.amount = raw;
  refreshCard();
  refreshFooter();
}

/* ── Amount blur (reformats value after editing) ── */
function onAmt(listName, id, input) {
  const raw  = parseInt(input.value.replace(/[^0-9]/g, '')) || 0;
  const list = listName === 'tips' ? tips : payments;
  const item = list.find(x => x.id === id);
  if (item) item.amount = raw;
  input.value = fmt(raw);
  refreshCard();
  refreshFooter();
}

/* ── Add / remove ── */
function addTip() {
  tips.push({ id: uid(), method: initMethod, amount: 0 });
  render();
}
function addPayment() {
  payments.push({ id: uid(), method: initMethod, amount: 0 });
  render();
}
function removeRow(listName, id) {
  if (listName === 'tips') tips     = tips.filter(x => x.id !== id);
  else                      payments = payments.filter(x => x.id !== id);
  render();
}

/* ── Bottom sheet ── */
function openBsco(listName, id) {
  bscoTgt = { listName, id };
  document.getElementById('bsco-ov').classList.add('show');
}
function closeBsco() {
  document.getElementById('bsco-ov').classList.remove('show');
  bscoTgt = null;
}
function handleBscoOv(e) {
  if (e.target === document.getElementById('bsco-ov')) closeBsco();
}
function selectMethod(method) {
  if (!bscoTgt) return;
  const list = bscoTgt.listName === 'tips' ? tips : payments;
  const item = list.find(x => x.id === bscoTgt.id);
  if (item) item.method = method;
  closeBsco();
  render();
}

/* ── Cobrar ── */
function handleCobrar() {
  const btn = document.getElementById('btn-cobrar');
  if (btn.classList.contains('disabled')) return;
  btn.innerHTML = '<div class="spinner"></div>';
  btn.classList.add('disabled');
  setTimeout(() => {
    const p = new URLSearchParams({
      mesa:     mesaId,
      zona,
      total:    Math.round(total()),
      subtotal: Math.round(subtotal),
      tax:      Math.round(tax),
      tip:      Math.round(tipSum()),
      method:   payments.map(pm => pm.method).join(',')
    });
    location.href = 'comprobante.html?' + p.toString();
  }, 1200);
}

/* ── Helpers ── */
function goBack() { history.back(); }

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-txt').textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 3000);
}

function updateClock() {
  const d  = new Date();
  const el = document.getElementById('sb-time');
  if (el) el.textContent = d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
}
</script>
</body>

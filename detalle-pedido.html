<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>BoldPOS — Detalle Pedido</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ─── Design Tokens ─── */
    :root {
      --blue-100:        #121e6c;
      --blue-10:         #f1f2f6;
      --coral-100:       #ff2947;
      --black-0:         #ffffff;
      --black-10:        #f3f3f3;
      --black-40:        #969696;
      --black-60:        #606060;
      --black-100:       #1e1e1e;
      --background-page: #f7f8fb;
      --font:            'Montserrat', sans-serif;
      --shadow-blue-8:   0px 8px 20px rgba(18,30,108,0.08);
      --radius-card:     16px;
      --radius-pill:     100px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: #d0d0d0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* ─── Phone shell ─── */
    #app {
      width: 393px;
      height: 100vh;
      background: var(--background-page);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ─── Status bar ─── */
    #status-bar {
      background: transparent;
      display: flex;
      align-items: center;
      padding: 8px 8px 0;
      flex-shrink: 0;
      position: relative;
    }
    .sb-left   { display:flex; align-items:center; gap:4px; font-size:11px; font-weight:600; color:var(--black-100); }
    .sb-center { position:absolute; left:50%; transform:translateX(-50%); font-size:12px; font-weight:600; color:var(--black-100); }
    .sb-right  { margin-left:auto; display:flex; align-items:center; }

    /* ─── Header ─── */
    #header {
      background: transparent;
      flex-shrink: 0;
      margin-top: 16px;
    }
    #nav-row {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }
    #btn-back {
      width: 32px; height: 32px;
      border: none; background: transparent;
      cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      border-radius: 8px;
      transition: background .12s;
    }
    #btn-back:active { background: var(--blue-10); }
    #nav-title {
      font-family: var(--font);
      font-size: 16px;
      font-weight: 600;
      line-height: 20px;
      color: var(--blue-100);
      text-align: center;
      flex: 1;
    }
    #nav-spacer {
      width: 32px;
      flex-shrink: 0;
    }

    /* ─── Mesa info card ─── */
    #mesa-info-card {
      margin: 10px 16px 0;
      background: var(--black-0);
      border: 1px solid #E8E9F0;
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .info-item {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }
    .info-val {
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      color: var(--black-100);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .info-sep {
      width: 1px;
      height: 20px;
      background: #E8E9F0;
      flex-shrink: 0;
      margin: 0 5px;
    }
    .badge-estado {
      display: inline-flex;
      align-items: center;
      border-radius: 100px;
      padding: 3px 8px;
      flex-shrink: 0;
      margin-left: 6px;
    }
    .badge-estado span {
      font-size: 11px;
      font-weight: 600;
      line-height: 16px;
      white-space: nowrap;
    }
    .badge-occupied  { background: #FEE2E2; }
    .badge-occupied span { color: #FF2947; }
    .badge-bill      { background: #FEF9C3; }
    .badge-bill span { color: #854F0B; }

    /* ─── Products list ─── */
    #products-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      scrollbar-width: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    #products-area::-webkit-scrollbar { display: none; }

    #empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--black-40);
      font-size: 14px;
      font-weight: 500;
    }

    .product-item {
      background: var(--black-0);
      padding: 12px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .product-item + .product-item {
      border-top: 1px solid #EEF0F8;
    }
    /* first item gets top border-radius, last gets bottom */
    #products-list {
      background: var(--black-0);
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: var(--shadow-blue-8);
      padding: 0 14px;
    }
    .product-row-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .product-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--black-100);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .qty-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .qty-btn {
      width: 28px; height: 28px;
      border-radius: 100px;
      border: 1.5px solid #E8E9F0;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      color: var(--black-100);
      -webkit-tap-highlight-color: transparent;
      transition: background .12s;
      padding: 0;
      line-height: 1;
    }
    .qty-btn:active { background: var(--blue-10); }
    .qty-num {
      font-size: 14px;
      font-weight: 600;
      color: var(--black-100);
      min-width: 24px;
      text-align: center;
    }
    .btn-delete {
      width: 28px; height: 28px;
      border: none; background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; padding: 0;
      -webkit-tap-highlight-color: transparent;
      border-radius: 8px;
      transition: background .12s;
      flex-shrink: 0;
    }
    .btn-delete:active { background: #FEE2E2; }
    .product-row-bottom {
      font-size: 12px;
      font-weight: 400;
      color: var(--black-60);
    }

    /* ─── Footer ─── */
    #footer {
      background: var(--black-0);
      border-top: 1px solid rgba(0,0,0,0.08);
      padding: 14px 16px 20px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .totals-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
    }
    .totals-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--black-60);
    }
    .totals-amount {
      font-size: 13px;
      font-weight: 500;
      color: var(--black-100);
    }
    .totals-sep {
      height: 1px;
      background: #EEF0F8;
      margin: 6px 0;
    }
    .totals-row-total .totals-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--black-100);
    }
    .totals-row-total .totals-amount {
      font-size: 18px;
      font-weight: 700;
      color: var(--blue-100);
    }
    #btn-action {
      margin-top: 14px;
      height: 48px;
      border-radius: 100px;
      border: none;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      color: var(--black-0);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity .15s;
      -webkit-tap-highlight-color: transparent;
    }
    #btn-action:active:not(:disabled) { opacity: 0.85; }
    #btn-action.disabled {
      opacity: 0.38;
      cursor: not-allowed;
    }
    #btn-action.coral { background: var(--coral-100); }
    #btn-action.blue  { background: var(--blue-100); }

    /* spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Status bar ── -->
  <div id="status-bar">
    <div class="sb-left">
      <span id="sb-time">9:41</span>
    </div>
    <div class="sb-right">
      <!-- Signal -->
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="8" width="3" height="4" rx="1" fill="#1e1e1e"/>
        <rect x="4.5" y="5.5" width="3" height="6.5" rx="1" fill="#1e1e1e"/>
        <rect x="9" y="3" width="3" height="9" rx="1" fill="#1e1e1e"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="#1e1e1e"/>
      </svg>
      <!-- Wifi -->
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-left:5px">
        <path d="M8 9.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5z" fill="#1e1e1e"/>
        <path d="M8 6.5C9.66 6.5 11.16 7.17 12.25 8.25L13.31 7.19A7 7 0 0 0 8 5a7 7 0 0 0-5.31 2.19l1.06 1.06A5 5 0 0 1 8 6.5z" fill="#1e1e1e"/>
        <path d="M8 3.5c2.48 0 4.73 1 6.36 2.63l1.06-1.06A9.95 9.95 0 0 0 8 2a9.95 9.95 0 0 0-7.42 3.07L1.64 6.13A8 8 0 0 1 8 3.5z" fill="#1e1e1e"/>
      </svg>
      <!-- Battery -->
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-left:5px">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#1e1e1e" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="16" height="8" rx="2" fill="#1e1e1e"/>
        <path d="M23 4v4a2 2 0 0 0 0-4z" fill="#1e1e1e" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- ── Header ── -->
  <div id="header">
    <div id="nav-row">
      <button id="btn-back" onclick="goBack()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 18l-6-6 6-6" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div id="nav-title">Cargando…</div>
      <div id="nav-spacer"></div>
    </div>
  </div>

  <!-- ── Mesa info card ── -->
  <div id="mesa-info-card">
    <!-- zona -->
    <div class="info-item">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" flex-shrink="0" style="flex-shrink:0">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="#606060" stroke-width="1.6"/>
        <circle cx="12" cy="9" r="2.5" stroke="#606060" stroke-width="1.6"/>
      </svg>
      <span class="info-val" id="du-zona">—</span>
    </div>
    <div class="info-sep"></div>
    <!-- personas -->
    <div class="info-item">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
        <circle cx="9" cy="7" r="3" stroke="#606060" stroke-width="1.6"/>
        <path d="M3 21v-1a6 6 0 0 1 6-6h0a6 6 0 0 1 6 6v1" stroke="#606060" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="#606060" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M21 21v-1a4 4 0 0 0-3-3.85" stroke="#606060" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span class="info-val" id="du-personas">—</span>
    </div>
    <div class="info-sep"></div>
    <!-- hora apertura -->
    <div class="info-item">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
        <circle cx="12" cy="12" r="9" stroke="#606060" stroke-width="1.6"/>
        <path d="M12 7v5l3 3" stroke="#606060" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span class="info-val" id="du-apertura">—</span>
    </div>
    <div class="info-sep"></div>
    <!-- tiempo en mesa -->
    <div class="info-item">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
        <circle cx="12" cy="13" r="8" stroke="#606060" stroke-width="1.6"/>
        <path d="M12 9v4l2.5 2.5" stroke="#606060" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M9 2h6M12 2v3" stroke="#606060" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span class="info-val" id="du-tiempo">—</span>
    </div>
    <!-- badge estado -->
    <div class="badge-estado" id="badge-estado">
      <span id="badge-estado-text">—</span>
    </div>
  </div>

  <!-- ── Products area ── -->
  <div id="products-area">
    <div id="products-list">
      <!-- items rendered by JS -->
    </div>
    <div id="empty-state" style="display:none">
      <span>Pedido vacío</span>
    </div>
  </div>

  <!-- ── Footer ── -->
  <div id="footer">
    <div class="totals-row">
      <span class="totals-label">Subtotal</span>
      <span class="totals-amount" id="val-subtotal">$0</span>
    </div>
    <div class="totals-row">
      <span class="totals-label">IVA (19%)</span>
      <span class="totals-amount" id="val-iva">$0</span>
    </div>
    <div class="totals-sep"></div>
    <div class="totals-row totals-row-total">
      <span class="totals-label">Total</span>
      <span class="totals-amount" id="val-total">$0</span>
    </div>
    <button id="btn-action" class="coral" onclick="handleAction()">
      Cargando…
    </button>
  </div>

</div>

<script src="data-manager.js"></script>
<script>
  /* ══ URL params ══ */
  const params     = new URLSearchParams(location.search);
  const mesaId     = params.get("mesa")   || "S05";
  const zona       = params.get("zona")   || "salon";
  const estadoParam = params.get("estado") || "occupied";

  /* ══ Comanda state helpers ══ */
  function loadComandaState(id) {
    try { return JSON.parse(localStorage.getItem("boldPOS_comanda_" + id)) || { estado: "pending", hora: null }; }
    catch(e) { return { estado: "pending", hora: null }; }
  }
  function saveComandaState(id, estado, hora) {
    localStorage.setItem("boldPOS_comanda_" + id, JSON.stringify({ estado, hora }));
  }

  /* ══ Direct localStorage helpers ══ */
  function updateProductQty(mId, productId, newQty) {
    try {
      const raw  = localStorage.getItem("boldPOS_mesas");
      const data = raw ? JSON.parse(raw) : {};
      if (data[mId] && data[mId].productos) {
        if (newQty <= 0) {
          data[mId].productos = data[mId].productos.filter(p => p.id !== productId);
        } else {
          const p = data[mId].productos.find(p => p.id === productId);
          if (p) p.cantidad = newQty;
        }
        data[mId].total = data[mId].productos.reduce((s, p) => s + p.precio * p.cantidad, 0);
        localStorage.setItem("boldPOS_mesas", JSON.stringify(data));
      }
    } catch(e) {}
  }

  function setMesaBillRequested(mId) {
    try {
      const raw  = localStorage.getItem("boldPOS_mesas");
      const data = raw ? JSON.parse(raw) : {};
      if (data[mId]) {
        data[mId].estado = "bill_requested";
        localStorage.setItem("boldPOS_mesas", JSON.stringify(data));
      }
    } catch(e) {}
  }

  /* ══ Formatting ══ */
  function fmtApertura(iso) {
    if (!iso) return "—";
    const d   = new Date(iso);
    let h     = d.getHours();
    const min = String(d.getMinutes()).padStart(2, "0");
    const ampm = h >= 12 ? "p.m." : "a.m.";
    h = h % 12 || 12;
    return `${h}:${min} ${ampm}`;
  }

  function fmtMoney(n) {
    return "$" + n.toLocaleString("es-CO");
  }

  /* ══ State ══ */
  let cart          = [];   // array of { id, nombre, precio, cantidad }
  let comandaState  = "pending"; // "pending" | "sent"
  let mesaEstado    = estadoParam; // from URL (kept in sync)

  /* ══ Navigation ══ */
  function goBack() {
    location.href = "detalle-mesa.html?mesa=" + mesaId + "&zona=" + zona + "&estado=" + mesaEstado;
  }

  /* ══ Render info card ══ */
  function renderInfoCard(mesa) {
    document.getElementById("du-zona").textContent     = (mesa.zona || zona).charAt(0).toUpperCase() + (mesa.zona || zona).slice(1);
    document.getElementById("du-personas").textContent = (mesa.personas || "—") + " pers.";
    document.getElementById("du-apertura").textContent = fmtApertura(mesa.horaApertura);
    document.getElementById("du-tiempo").textContent   = DataManager.calcTime(mesa.horaApertura) || "—";

    const badge     = document.getElementById("badge-estado");
    const badgeTxt  = document.getElementById("badge-estado-text");
    const curEstado = mesa.estado || estadoParam;
    if (curEstado === "bill_requested") {
      badge.className    = "badge-estado badge-bill";
      badgeTxt.textContent = "Cuenta solicitada";
    } else {
      badge.className    = "badge-estado badge-occupied";
      badgeTxt.textContent = "Ocupada";
    }
  }

  /* ══ Render product list ══ */
  function renderList() {
    const list      = document.getElementById("products-list");
    const emptyEl   = document.getElementById("empty-state");
    const area      = document.getElementById("products-area");

    if (!cart.length) {
      list.style.display  = "none";
      emptyEl.style.display = "flex";
      area.style.alignItems = "center";
      area.style.justifyContent = "center";
    } else {
      list.style.display  = "block";
      emptyEl.style.display = "none";
      area.style.alignItems = "";
      area.style.justifyContent = "";
    }

    list.innerHTML = cart.map(item => {
      const subtotal = fmtMoney(item.precio * item.cantidad);
      const unitario = fmtMoney(item.precio);
      return `
        <div class="product-item" data-id="${item.id}">
          <div class="product-row-top">
            <span class="product-name">${escHtml(item.nombre)}</span>
            <div class="qty-controls">
              <button class="qty-btn" onclick="changeQty('${item.id}', -1)">−</button>
              <span class="qty-num">${item.cantidad}</span>
              <button class="qty-btn" onclick="changeQty('${item.id}', 1)">+</button>
            </div>
            <button class="btn-delete" onclick="deleteItem('${item.id}')" title="Eliminar">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="#969696" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <div class="product-row-bottom">
            ${unitario} × ${item.cantidad} = ${subtotal}
          </div>
        </div>
      `;
    }).join("");

    renderTotals();
    renderActionBtn();
  }

  /* ══ Render totals ══ */
  function renderTotals() {
    const subtotal = cart.reduce((s, p) => s + p.precio * p.cantidad, 0);
    const iva      = Math.round(subtotal * 0.19);
    const total    = subtotal + iva;
    document.getElementById("val-subtotal").textContent = fmtMoney(subtotal);
    document.getElementById("val-iva").textContent      = fmtMoney(iva);
    document.getElementById("val-total").textContent    = fmtMoney(total);
  }

  /* ══ Render action button ══ */
  function renderActionBtn() {
    const btn       = document.getElementById("btn-action");
    const isEmpty   = cart.length === 0;
    const curEstado = (DataManager.getMesa(mesaId) || {}).estado || mesaEstado;

    // Re-read comanda state
    const cs = loadComandaState(mesaId);
    comandaState = cs.estado;

    if (curEstado === "bill_requested") {
      btn.textContent = "Ir a checkout";
      btn.className   = "blue";
      btn.classList.remove("disabled");
    } else if (comandaState === "sent") {
      btn.textContent = "Solicitar cuenta";
      btn.className   = "coral";
      btn.classList.remove("disabled");
    } else {
      // pending
      btn.textContent = "Enviar comanda";
      btn.className   = "coral";
      if (isEmpty) {
        btn.classList.add("disabled");
      } else {
        btn.classList.remove("disabled");
      }
    }
  }

  /* ══ Quantity controls ══ */
  function changeQty(productId, delta) {
    const item = cart.find(p => p.id === productId);
    if (!item) return;
    const newQty = item.cantidad + delta;
    if (newQty <= 0) {
      deleteItem(productId);
    } else {
      item.cantidad = newQty;
      updateProductQty(mesaId, productId, newQty);
      renderList();
    }
  }

  function deleteItem(productId) {
    cart = cart.filter(p => p.id !== productId);
    updateProductQty(mesaId, productId, 0);
    renderList();
  }

  /* ══ Action button handler ══ */
  function handleAction() {
    const btn = document.getElementById("btn-action");
    if (btn.classList.contains("disabled")) return;

    const cs        = loadComandaState(mesaId);
    const curMesa   = DataManager.getMesa(mesaId) || {};
    const curEstado = curMesa.estado || mesaEstado;

    if (curEstado === "bill_requested") {
      // Go to checkout
      location.href = "checkout.html?mesa=" + mesaId + "&zona=" + zona + "&estado=bill_requested";
      return;
    }

    if (cs.estado === "sent") {
      // Solicitar cuenta
      setMesaBillRequested(mesaId);
      mesaEstado = "bill_requested";
      saveComandaState(mesaId, "sent", cs.hora);
      location.href = "detalle-mesa.html?mesa=" + mesaId + "&zona=" + zona + "&estado=bill_requested";
      return;
    }

    // Pending → enviar comanda (simulate with spinner)
    btn.innerHTML  = '<div class="spinner"></div>';
    btn.classList.add("disabled");

    setTimeout(function() {
      saveComandaState(mesaId, "sent", new Date().toISOString());
      location.href = "detalle-mesa.html?mesa=" + mesaId + "&zona=" + zona + "&estado=" + mesaEstado;
    }, 1200);
  }

  /* ══ Escape HTML ══ */
  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  /* ══ Status bar clock ══ */
  function updateClock() {
    const now = new Date();
    let h   = now.getHours();
    const m = String(now.getMinutes()).padStart(2, "0");
    document.getElementById("sb-time").textContent = h + ":" + m;
  }
  updateClock();
  setInterval(updateClock, 30000);

  /* ══ Init ══ */
  (function init() {
    DataManager.init();

    const mesa = DataManager.getMesa(mesaId);
    if (!mesa) {
      document.getElementById("nav-title").textContent = "Mesa " + mesaId;
      document.getElementById("empty-state").style.display = "flex";
      document.getElementById("products-list").style.display = "none";
      renderTotals();
      renderActionBtn();
      return;
    }

    // Title
    document.getElementById("nav-title").textContent = "Mesa " + mesaId;

    // Sync mesaEstado from storage (may differ from URL param)
    mesaEstado = mesa.estado || estadoParam;

    // Load cart from mesa.productos
    cart = (mesa.productos || []).map(p => ({ id: p.id, nombre: p.nombre, precio: p.precio, cantidad: p.cantidad }));

    // Load comanda state
    const cs = loadComandaState(mesaId);
    // If mesa is bill_requested but comanda was pending, elevate to sent
    if (mesaEstado === "bill_requested" && cs.estado === "pending") {
      saveComandaState(mesaId, "sent", new Date().toISOString());
    }
    comandaState = loadComandaState(mesaId).estado;

    renderInfoCard(mesa);
    renderList();
  })();
</script>

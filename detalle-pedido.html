<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>BoldPOS — Detalle Pedido</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ─── Tokens ─── */
    :root {
      --blue-100:        #121e6c;
      --blue-10:         #f1f2f6;
      --coral-100:       #ff2947;
      --black-0:         #ffffff;
      --black-10:        #f3f3f3;
      --black-40:        #969696;
      --black-60:        #606060;
      --black-100:       #1e1e1e;
      --background-page: #f7f8fb;
      --font:            'Montserrat', sans-serif;
      --shadow-blue-8:   0px 8px 20px rgba(18,30,108,0.08);
      --radius-card:     16px;
      --radius-pill:     100px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: var(--font); background: #d0d0d0; display: flex; justify-content: center; align-items: flex-start; }

    /* ─── Phone shell ─── */
    #app { width: 393px; height: 100vh; background: var(--background-page); display: flex; flex-direction: column; overflow: hidden; position: relative; }

    /* ─── Status bar ─── */
    #status-bar { background: transparent; display: flex; align-items: center; padding: 8px 8px 0; flex-shrink: 0; }
    .sb-left  { display:flex; align-items:center; gap:4px; font-size:11px; font-weight:600; color:var(--black-100); }
    .sb-right { margin-left:auto; display:flex; align-items:center; }

    /* ─── Header ─── */
    #header { background: transparent; flex-shrink: 0; margin-top: 12px; }
    #nav-row { height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
    #btn-back {
      width: 32px; height: 32px; border: none; background: transparent;
      cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; -webkit-tap-highlight-color: transparent;
      border-radius: 8px; transition: background .12s;
    }
    #btn-back:active { background: var(--blue-10); }
    #nav-title-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    #nav-title { font-size: 16px; font-weight: 700; color: var(--blue-100); line-height: 20px; }
    #nav-spacer { width: 32px; flex-shrink: 0; }

    /* ─── Badge de estado ─── */
    .badge-estado { display: inline-flex; align-items: center; gap: 5px; border-radius: 100px; padding: 3px 10px; flex-shrink: 0; }
    .badge-estado .badge-text { font-size: 11px; font-weight: 600; line-height: 16px; white-space: nowrap; }
    .badge-occupied          { background: #FEE2E2; }
    .badge-occupied .badge-text   { color: #FF2947; }
    .badge-bill              { background: #fde8e8; }
    .badge-bill .badge-text       { color: #c0392b; }
    .badge-available         { background: #D1FAE5; }
    .badge-available .badge-text  { color: #065F46; }
    .pulse-dot { display: none; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .badge-bill .pulse-dot { display: inline-block; background: #c0392b; animation: pulse-dot 1.2s ease-in-out infinite; }
    @keyframes pulse-dot { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.5);opacity:0.6;} }

    /* ─── Mesa info card ─── */
    #mesa-info-card {
      margin: 8px 16px 0; background: var(--black-0);
      border: 1px solid #E8E9F0; border-radius: 12px;
      padding: 10px 12px; display: flex; align-items: center; flex-shrink: 0;
    }
    .info-item { display: flex; align-items: center; gap: 4px; flex: 1; min-width: 0; }
    .info-val { font-size: 12px; font-weight: 500; color: var(--black-100); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .info-sep { width: 1px; height: 20px; background: #E8E9F0; flex-shrink: 0; margin: 0 5px; }
    #btn-dots-info {
      width: 28px; height: 28px; border: none; background: transparent;
      cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-left: 4px; -webkit-tap-highlight-color: transparent;
      border-radius: 6px; transition: background .12s;
    }
    #btn-dots-info:active { background: var(--blue-10); }

    /* ─── Section header: PEDIDO + ＋ Agregar ─── */
    #section-header {
      display: none; flex-shrink: 0;
      padding: 14px 16px 0;
      flex-direction: row; align-items: center; justify-content: space-between;
    }
    #section-label {
      font-size: 11px; font-weight: 700; color: var(--black-40);
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    #btn-agregar-header {
      border: none; background: transparent;
      font-family: var(--font); font-size: 13px; font-weight: 600;
      color: var(--coral-100); cursor: pointer; padding: 4px 0;
      -webkit-tap-highlight-color: transparent;
    }
    #btn-agregar-header:active { opacity: 0.7; }

    /* ─── Scrollable products area ─── */
    #products-area {
      flex: 1; overflow-y: auto; min-height: 0;
      display: flex; flex-direction: column;
      scrollbar-width: none;
    }
    #products-area::-webkit-scrollbar { display: none; }

    /* ─── DISPONIBLE view ─── */
    #view-disponible {
      display: none; flex: 1;
      align-items: center; justify-content: center;
      padding: 32px 24px;
    }
    #btn-iniciar {
      width: 100%; height: 52px; border-radius: var(--radius-pill); border: none;
      background: var(--coral-100); color: var(--black-0);
      font-family: var(--font); font-size: 16px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(255,41,71,.3);
      transition: opacity .15s; -webkit-tap-highlight-color: transparent;
    }
    #btn-iniciar:active { opacity: 0.85; }

    /* ─── SIN_PRODUCTOS view ─── */
    #view-sin-productos {
      display: none; flex: 1;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; padding: 32px 32px;
    }
    .empty-icon { color: #CBD5E1; }
    .empty-label { font-size: 15px; font-weight: 600; color: var(--black-60); text-align: center; }
    #btn-agregar-empty {
      margin-top: 6px; height: 48px; padding: 0 32px;
      border-radius: var(--radius-pill); border: none;
      background: var(--coral-100); color: var(--black-0);
      font-family: var(--font); font-size: 14px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(255,41,71,.3);
      transition: opacity .15s; -webkit-tap-highlight-color: transparent;
    }
    #btn-agregar-empty:active { opacity: 0.85; }

    /* ─── Status alert ─── */
    #status-alert {
      display: none; margin: 12px 16px 0;
      padding: 8px 12px; border-radius: 8px;
      font-family: var(--font); font-size: 12px; font-weight: 600;
      flex-shrink: 0;
    }
    #status-alert.alert-sent     { display: block; background: #f0faf5; color: #2e7d5e; }
    #status-alert.alert-modified { display: block; background: #fff8e6; color: #b07d00; }

    /* ─── Product list ─── */
    #products-list { padding: 12px 16px 16px; display: none; flex-direction: column; gap: 8px; }

    /* Product card — Figma 26620-2838 */
    .product-card {
      background: var(--black-0); border-radius: 16px; padding: 12px;
      display: flex; flex-direction: column; gap: 24px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: opacity .12s;
    }
    .product-card:active { opacity: 0.88; }
    .product-card.readonly { cursor: default; }
    .product-card.readonly:active { opacity: 1; }

    .product-card-top { display: flex; align-items: center; gap: 16px; }
    .product-card-name-col {
      flex: 1; min-width: 0; display: flex; flex-direction: column;
      height: 60px; justify-content: space-between;
    }
    .product-card-name {
      font-size: 14px; font-weight: 400; color: var(--black-100);
      line-height: 20px; height: 45px; overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .product-card-nota-text {
      font-size: 12px; font-weight: 400; color: var(--black-60);
      line-height: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .product-card-agregar-nota {
      font-size: 12px; font-weight: 600; color: var(--black-60);
      line-height: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      text-decoration: underline; text-underline-offset: 2px;
    }
    .product-card-controls { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

    .qty-counter {
      background: var(--background-page); border-radius: 100px;
      padding: 8px; display: flex; align-items: center; gap: 2px; height: 40px;
    }
    .qty-counter-btn {
      width: 24px; height: 24px; border: none; background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; padding: 0; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent; border-radius: 4px; transition: background .12s;
    }
    .qty-counter-btn:active { background: rgba(18,30,108,.08); }
    .qty-counter-num {
      font-size: 16px; font-weight: 500; color: var(--blue-100);
      width: 48px; text-align: center; line-height: 20px;
    }
    .qty-readonly { font-size: 13px; font-weight: 600; color: var(--black-60); background: #F3F4F6; border-radius: 6px; padding: 2px 8px; flex-shrink: 0; }

    .btn-trash {
      width: 24px; height: 24px; border: none; background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; padding: 0; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent; border-radius: 4px; transition: background .12s;
    }
    .btn-trash:active { background: #FEE2E2; }

    .product-card-bottom { display: flex; align-items: center; gap: 16px; }
    .product-card-price { flex: 1; font-size: 14px; font-weight: 500; color: var(--black-100); line-height: 20px; min-width: 0; }
    .product-card-editar {
      font-size: 12px; font-weight: 600; color: #E8194B;
      text-decoration: underline; text-underline-offset: 2px;
      white-space: nowrap; flex-shrink: 0; cursor: pointer;
    }

    /* ─── Footer ─── */
    #footer {
      background: var(--black-0); border-top: 1px solid rgba(0,0,0,0.08);
      padding: 12px 16px 20px; flex-shrink: 0; display: flex; flex-direction: column;
    }
    #totals-wrap { display: flex; flex-direction: column; }
    .totals-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
    .totals-label { font-size: 13px; font-weight: 500; color: var(--black-60); }
    .totals-amount { font-size: 13px; font-weight: 500; color: var(--black-100); }
    .totals-sep { height: 1px; background: #EEF0F8; margin: 5px 0; }
    .totals-row-total .totals-label { font-size: 15px; font-weight: 700; color: var(--black-100); }
    .totals-row-total .totals-amount { font-size: 18px; font-weight: 700; color: var(--blue-100); }

    /* ─── Action bar ─── */
    #action-bar { margin-top: 10px; display: flex; gap: 10px; }
    #btn-secondary {
      flex: 1; height: 48px; border-radius: var(--radius-pill);
      border: 1.5px solid var(--coral-100); background: transparent;
      font-family: var(--font); font-size: 14px; font-weight: 600; color: var(--coral-100);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s; -webkit-tap-highlight-color: transparent; white-space: nowrap;
    }
    #btn-secondary:active { background: rgba(255,41,71,.06); }
    #btn-primary {
      flex: 1; height: 48px; border-radius: var(--radius-pill); border: none;
      background: var(--coral-100);
      font-family: var(--font); font-size: 14px; font-weight: 600; color: var(--black-0);
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .15s; -webkit-tap-highlight-color: transparent; white-space: nowrap;
    }
    #btn-primary:active:not(.disabled) { opacity: 0.85; }
    #btn-primary.disabled { opacity: 0.38; cursor: not-allowed; }

    /* ─── Spinner ─── */
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Info Drop Up ─── */
    #info-dropup-overlay { display: none; position: absolute; inset: 0; z-index: 300; background: rgba(0,0,0,.45); align-items: flex-end; }
    #info-dropup-overlay.show { display: flex; }
    #info-dropup-sheet { width: 100%; background: var(--black-0); border-radius: 24px 24px 0 0; padding: 8px 0 32px; transform: translateY(100%); transition: transform 200ms ease; }
    #info-dropup-overlay.show #info-dropup-sheet { transform: translateY(0); }
    #info-dropup-handle { width: 36px; height: 4px; background: #D1D5DB; border-radius: 2px; margin: 0 auto 16px; }
    #info-dropup-title-row { padding: 0 20px 14px; }
    #info-dropup-heading { font-size: 16px; font-weight: 700; color: var(--blue-100); }
    #info-dropup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 8px; padding: 0 20px 16px; }
    .du-item { display: flex; flex-direction: column; gap: 2px; }
    .du-label { font-size: 11px; font-weight: 400; color: var(--black-40); line-height: 14px; }
    .du-val   { font-size: 13px; font-weight: 600; color: var(--black-100); line-height: 18px; }
    #info-dropup-sep { height: 1px; background: rgba(0,0,0,.07); margin: 0 20px 8px; }
    .du-action { width: 100%; display: flex; align-items: center; gap: 12px; padding: 14px 20px; border: none; background: transparent; font-family: var(--font); font-size: 15px; font-weight: 500; color: var(--black-100); cursor: pointer; text-align: left; -webkit-tap-highlight-color: transparent; }
    .du-action:active { background: var(--blue-10); }
    .du-action.du-action-red { color: #FF2947; }

    /* ─── Confirm modal ─── */
    #confirm-overlay { display: none; position: absolute; inset: 0; z-index: 350; background: rgba(0,0,0,.5); align-items: center; justify-content: center; padding: 24px; }
    #confirm-overlay.show { display: flex; }
    #confirm-modal { background: var(--black-0); border-radius: 20px; padding: 28px 24px 24px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; box-shadow: 0 24px 48px rgba(0,0,0,.2); }
    #confirm-warning-icon { width: 52px; height: 52px; border-radius: 16px; background: #FFF0F1; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
    #confirm-title  { font-size: 17px; font-weight: 700; color: var(--blue-100); text-align: center; line-height: 24px; }
    #confirm-body   { font-size: 13px; font-weight: 400; color: var(--black-60); text-align: center; line-height: 20px; }
    #confirm-btns   { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: 8px; }
    #btn-confirm-cancel-action { width: 100%; height: 48px; border-radius: var(--radius-pill); border: none; background: #FF2947; color: #fff; font-family: var(--font); font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity .15s; }
    #btn-confirm-cancel-action:active { opacity: 0.85; }
    #btn-confirm-keep { width: 100%; height: 44px; border-radius: var(--radius-pill); border: 1.5px solid rgba(18,30,108,.15); background: transparent; color: var(--blue-100); font-family: var(--font); font-size: 15px; font-weight: 500; cursor: pointer; transition: background .15s; }
    #btn-confirm-keep:active { background: var(--blue-10); }
  </style>
</head>
<body>
<div id="app">

  <!-- Status bar -->
  <div id="status-bar">
    <div class="sb-left"><span id="sb-time">9:41</span></div>
    <div class="sb-right">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="8" width="3" height="4" rx="1" fill="#1e1e1e"/>
        <rect x="4.5" y="5.5" width="3" height="6.5" rx="1" fill="#1e1e1e"/>
        <rect x="9" y="3" width="3" height="9" rx="1" fill="#1e1e1e"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="#1e1e1e"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none" style="margin-left:5px">
        <path d="M8 9.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5z" fill="#1e1e1e"/>
        <path d="M8 6.5C9.66 6.5 11.16 7.17 12.25 8.25L13.31 7.19A7 7 0 0 0 8 5a7 7 0 0 0-5.31 2.19l1.06 1.06A5 5 0 0 1 8 6.5z" fill="#1e1e1e"/>
        <path d="M8 3.5c2.48 0 4.73 1 6.36 2.63l1.06-1.06A9.95 9.95 0 0 0 8 2a9.95 9.95 0 0 0-7.42 3.07L1.64 6.13A8 8 0 0 1 8 3.5z" fill="#1e1e1e"/>
      </svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none" style="margin-left:5px">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#1e1e1e" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="16" height="8" rx="2" fill="#1e1e1e"/>
        <path d="M23 4v4a2 2 0 0 0 0-4z" fill="#1e1e1e" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Header -->
  <div id="header">
    <div id="nav-row">
      <button id="btn-back" onclick="goBack()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M15 18l-6-6 6-6" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div id="nav-title-group">
        <span id="nav-title">Cargando…</span>
        <div class="badge-estado badge-occupied" id="badge-estado">
          <span class="pulse-dot"></span>
          <span class="badge-text" id="badge-estado-text">Ocupada</span>
        </div>
      </div>
      <div id="nav-spacer"></div>
    </div>
  </div>

  <!-- Mesa info card -->
  <div id="mesa-info-card">
    <div class="info-item">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="#606060" stroke-width="1.6"/>
        <circle cx="12" cy="9" r="2.5" stroke="#606060" stroke-width="1.6"/>
      </svg>
      <span class="info-val" id="du-zona">—</span>
    </div>
    <div class="info-sep"></div>
    <div class="info-item">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
        <circle cx="9" cy="7" r="3" stroke="#606060" stroke-width="1.6"/>
        <path d="M3 21v-1a6 6 0 0 1 6-6h0a6 6 0 0 1 6 6v1" stroke="#606060" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="#606060" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M21 21v-1a4 4 0 0 0-3-3.85" stroke="#606060" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span class="info-val" id="du-personas">—</span>
    </div>
    <div class="info-sep"></div>
    <div class="info-item">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
        <circle cx="12" cy="12" r="9" stroke="#606060" stroke-width="1.6"/>
        <path d="M12 7v5l3 3" stroke="#606060" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span class="info-val" id="du-apertura">—</span>
    </div>
    <div class="info-sep"></div>
    <div class="info-item">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
        <circle cx="12" cy="13" r="8" stroke="#606060" stroke-width="1.6"/>
        <path d="M12 9v4l2.5 2.5" stroke="#606060" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M9 2h6M12 2v3" stroke="#606060" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span class="info-val" id="du-tiempo">—</span>
    </div>
    <button id="btn-dots-info" onclick="openInfoDropUp()" aria-label="Más acciones">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <circle cx="5"  cy="12" r="1.5" fill="#606060"/>
        <circle cx="12" cy="12" r="1.5" fill="#606060"/>
        <circle cx="19" cy="12" r="1.5" fill="#606060"/>
      </svg>
    </button>
  </div>

  <!-- Section header: PEDIDO + ＋ Agregar -->
  <div id="section-header">
    <span id="section-label">PEDIDO</span>
    <button id="btn-agregar-header" onclick="goToAgregar()">＋ Agregar productos</button>
  </div>

  <!-- Scrollable area -->
  <div id="products-area">

    <!-- DISPONIBLE: centered CTA -->
    <div id="view-disponible">
      <button id="btn-iniciar" onclick="handleIniciarPedido()">Iniciar pedido</button>
    </div>

    <!-- SIN_PRODUCTOS: empty state -->
    <div id="view-sin-productos">
      <svg class="empty-icon" width="72" height="72" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
        <line x1="9" y1="12" x2="15" y2="12"/>

          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" stroke="#FF2947" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

          <line x1="12" y1="9" x2="12" y2="13" stroke="#FF2947" stroke-width="1.8" stroke-linecap="round"/>

<script src="data-manager.js"></script>
<script>
/* ══ URL params ══ */
const params        = new URLSearchParams(location.search);
const mesaId        = params.get("mesa")   || "S05";
const zona          = params.get("zona")   || "salon";
const personasParam = parseInt(params.get("personas")) || 2;

/* ══ State ══ */
const ESTADOS = {
  DISPONIBLE:          'DISPONIBLE',
  SIN_PRODUCTOS:       'SIN_PRODUCTOS',
  PEDIDO_PENDIENTE:    'PEDIDO_PENDIENTE',
  PEDIDO_CONFIRMADO:   'PEDIDO_CONFIRMADO',
  COMANDA_ENVIADA:     'COMANDA_ENVIADA',
  COMANDA_CON_AJUSTES: 'COMANDA_CON_AJUSTES',
  CUENTA_SOLICITADA:   'CUENTA_SOLICITADA',
};

let estado     = ESTADOS.DISPONIBLE;
let cart       = [];   // [{ id, nombre, precio, cantidad }]
let horaComanda = null;
let secondaryFn = null;

/* ══ Persistence: mesa_{ID} ══ */
function loadMsState(id) {
  try { return JSON.parse(localStorage.getItem('mesa_' + id)) || {}; }
  catch(e) { return {}; }
}
function saveMsState(id, patch) {
  const s = loadMsState(id);
  localStorage.setItem('mesa_' + id, JSON.stringify({ ...s, ...patch }));
}

/* ══ Product persistence (DataManager layer) ══ */
function persistProducts() {
  // Source of truth: mesa_{ID}
  saveMsState(mesaId, { productos: cart });
  // Keep boldPOS_mesas in sync so venta-mesas stays consistent
  try {
    const raw  = localStorage.getItem('boldPOS_mesas') || '{}';
    const data = JSON.parse(raw);
    if (data[mesaId]) {
      data[mesaId].productos = cart.map(p => ({
        id: p.id, nombre: p.nombre, precio: p.precio, cantidad: p.cantidad, categoria: p.categoria || ''
      }));
      data[mesaId].total = cart.reduce((s, p) => s + p.precio * p.cantidad, 0);
      localStorage.setItem('boldPOS_mesas', JSON.stringify(data));
    }
  } catch(e) {}
}

function setMesaBillRequested() {
  try {
    const raw  = localStorage.getItem('boldPOS_mesas') || '{}';
    const data = JSON.parse(raw);
    if (data[mesaId]) { data[mesaId].estado = 'bill_requested'; localStorage.setItem('boldPOS_mesas', JSON.stringify(data)); }
  } catch(e) {}
}

/* ══ Formatting ══ */
function fmtApertura(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  let h = d.getHours();
  const min = String(d.getMinutes()).padStart(2, '0');
  const ampm = h >= 12 ? 'p.m.' : 'a.m.';
  h = h % 12 || 12;
  return `${h}:${min} ${ampm}`;
}
function fmtHoraNow() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}
function fmtMoney(n) { return '$' + n.toLocaleString('es-CO'); }
function escHtml(s)  { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ══ Navigation ══ */
function goBack() {
  const zonaActual = new URLSearchParams(location.search).get('zona') || 'salon';
  location.href = 'venta-mesas.html?zona=' + zonaActual;
}
function goToAgregar() {
  const p = new URLSearchParams({ mesa: mesaId, zona, estado: _dmEstado() });
  location.href = 'detalle-mesa.html?' + p.toString();
}
function _dmEstado() {
  if (estado === ESTADOS.CUENTA_SOLICITADA) return 'bill_requested';
  if (estado === ESTADOS.DISPONIBLE) return 'available';
  return 'occupied';
}

/* ══ Clock ══ */
function updateClock() {
  const now = new Date();
  document.getElementById('sb-time').textContent =
    now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
}

/* ══ Render badge ══ */
function renderBadge() {
  const badge = document.getElementById('badge-estado');
  const txt   = document.getElementById('badge-estado-text');
  if (estado === ESTADOS.DISPONIBLE) {
    badge.className = 'badge-estado badge-available'; txt.textContent = 'Disponible';
  } else if (estado === ESTADOS.CUENTA_SOLICITADA) {
    badge.className = 'badge-estado badge-bill'; txt.textContent = 'Cuenta solicitada';
  } else {
    badge.className = 'badge-estado badge-occupied'; txt.textContent = 'Ocupada';
  }
}

/* ══ Render info card ══ */
function renderInfoCard() {
  const card = document.getElementById('mesa-info-card');
  if (estado === ESTADOS.DISPONIBLE) { card.style.display = 'none'; return; }
  card.style.display = '';
  const zonaLabel = { salon:'Salón', terraza:'Terraza', barra:'Barra' };
  document.getElementById('du-zona').textContent = zonaLabel[zona] || zona;
  const mesa = DataManager.getMesa(mesaId);
  document.getElementById('du-personas').textContent = mesa ? (mesa.personas || '—') + ' pers.' : '—';
  document.getElementById('du-apertura').textContent = mesa ? fmtApertura(mesa.horaApertura) : '—';
  document.getElementById('du-tiempo').textContent   = (mesa && mesa.horaApertura) ? DataManager.calcTime(mesa.horaApertura) : '—';
  document.getElementById('dropup-zona').textContent     = zonaLabel[zona] || zona;
  document.getElementById('dropup-personas').textContent = mesa ? (mesa.personas || '—') + ' pers.' : '—';
  document.getElementById('dropup-apertura').textContent = mesa ? fmtApertura(mesa.horaApertura) : '—';
  document.getElementById('dropup-tiempo').textContent   = (mesa && mesa.horaApertura) ? DataManager.calcTime(mesa.horaApertura) : '—';
}

/* ══ Render totals ══ */
function renderTotals() {
  const sub = cart.reduce((s, p) => s + p.precio * p.cantidad, 0);
  const iva = Math.round(sub * 0.19);
  document.getElementById('val-subtotal').textContent = fmtMoney(sub);
  document.getElementById('val-iva').textContent      = fmtMoney(iva);
  document.getElementById('val-total').textContent    = fmtMoney(sub + iva);
}

/* ══ Render product list ══ */
function renderProductList(readOnly) {
  const listEl = document.getElementById('products-list');
  listEl.style.display = 'flex';
  listEl.innerHTML = cart.map(item => {
    const unit = fmtMoney(item.precio);
    const sub  = fmtMoney(item.precio * item.cantidad);

    if (readOnly) {
      return `
        <div class="product-card readonly">
          <div class="product-card-top">
            <span class="product-card-name">${escHtml(item.nombre)}</span>
            <span class="qty-readonly">× ${item.cantidad}</span>
          </div>
          <div class="product-card-bottom">
            <span class="product-card-price">${unit} × ${item.cantidad} = ${sub}</span>
          </div>
        </div>`;
    }

    const hasNota = item.nota && item.nota.trim().length > 0;
    const notaLineHtml = hasNota
      ? `<span class="product-card-nota-text">${escHtml(item.nota.trim())}</span>`
      : `<span class="product-card-agregar-nota">Agregar nota</span>`;
    return `
      <div class="product-card" onclick="goToEditarProducto('${item.id}')">
        <div class="product-card-top">
          <div class="product-card-name-col">
            <span class="product-card-name">${escHtml(item.nombre)}</span>
            ${notaLineHtml}
          </div>
          <div class="product-card-controls" onclick="event.stopPropagation()">
            <div class="qty-counter">
              <button class="qty-counter-btn" onclick="changeQty('${item.id}',-1)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <path d="M5 12h14" stroke="#121e6c" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </button>
              <span class="qty-counter-num">${item.cantidad}</span>
              <button class="qty-counter-btn" onclick="changeQty('${item.id}',1)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <path d="M12 5v14M5 12h14" stroke="#121e6c" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
            <button class="btn-trash" onclick="deleteItem('${item.id}')">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="#969696" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="product-card-bottom">
          <span class="product-card-price">${unit} × ${item.cantidad} = ${sub}</span>
          <span class="product-card-editar">Editar</span>
        </div>
      </div>`;
  }).join('');
}

/* ══ Navigate to edit product ══ */
function goToEditarProducto(productId) {
  const p = new URLSearchParams({ mesa: mesaId, producto: productId, zona });
  location.href = 'editar-producto.html?' + p.toString();
}

/* ══ Show/hide helpers ══ */
function el(id) { return document.getElementById(id); }
function show(id, v) { const e = el(id); if(e) e.style.display = v ? '' : 'none'; }
function flex(id, v) { const e = el(id); if(e) e.style.display = v ? 'flex' : 'none'; }

function setSingleBtn(label, disabled) {
  flex('btn-secondary', false);
  const pri = el('btn-primary');
  pri.style.flex = 'unset'; pri.style.width = '100%';
  pri.className = disabled ? 'disabled' : '';
  pri.textContent = label;
  secondaryFn = null;
}
function setDualBtn(secLabel, secFn, priLabel) {
  flex('btn-secondary', true);
  el('btn-secondary').textContent = secLabel;
  secondaryFn = secFn;
  const pri = el('btn-primary');
  pri.style.flex = '1'; pri.style.width = '';
  pri.className = '';
  pri.textContent = priLabel;
}
function showAlert(msg, type) {
  const a = el('status-alert');
  a.className = 'alert-' + type;
  a.textContent = msg;
}
function clearAlert() {
  el('status-alert').className = '';
}

/* ══ Master render ══ */
function render() {
  renderBadge();
  renderInfoCard();

  // Hide all views
  flex('view-disponible', false);
  flex('view-sin-productos', false);
  show('section-header', false);
  show('products-list', false);
  clearAlert();
  show('footer', false);

  switch(estado) {

    case ESTADOS.DISPONIBLE:
      flex('view-disponible', true);
      break;

    case ESTADOS.SIN_PRODUCTOS:
      flex('view-sin-productos', true);
      break;

    case ESTADOS.PEDIDO_PENDIENTE:
      flex('section-header', true); flex('btn-agregar-header', true);
      renderProductList(false);
      renderTotals();
      show('totals-wrap', true);
      setSingleBtn('Confirmar pedido', false);
      show('footer', true);
      break;

    case ESTADOS.PEDIDO_CONFIRMADO:
      flex('section-header', true); flex('btn-agregar-header', true);
      renderProductList(false);
      renderTotals();
      show('totals-wrap', true);
      setDualBtn('Solicitar cuenta', handleSolicitarCuenta, 'Enviar comanda');
      show('footer', true);
      break;

    case ESTADOS.COMANDA_ENVIADA:
      flex('section-header', true); flex('btn-agregar-header', true);
      showAlert('✓ Comanda enviada · ' + (horaComanda || ''), 'sent');
      renderProductList(false);
      renderTotals();
      show('totals-wrap', true);
      setDualBtn('Reenviar comanda', handleReenviarComanda, 'Solicitar cuenta');
      show('footer', true);
      break;

    case ESTADOS.COMANDA_CON_AJUSTES:
      flex('section-header', true); flex('btn-agregar-header', true);
      showAlert('⚠ Hay cambios pendientes por reenviar', 'modified');
      renderProductList(false);
      renderTotals();
      show('totals-wrap', true);
      setDualBtn('Solicitar cuenta', handleSolicitarCuenta, 'Reenviar comanda');
      show('footer', true);
      break;

    case ESTADOS.CUENTA_SOLICITADA:
      flex('section-header', true); flex('btn-agregar-header', false);
      renderProductList(true);
      renderTotals();
      show('totals-wrap', true);
      setDualBtn('Reenviar comanda', handleReenviarComanda, 'Cobrar mesa');
      show('footer', true);
      break;
  }
}

/* ══ Transitions ══ */
function transicion(nuevoEstado, patch) {
  estado = nuevoEstado;
  saveMsState(mesaId, { estado, horaComanda, productos: cart, ...patch });

  // Sync DataManager (boldPOS_mesas) so venta-mesas.html shows the right status
  if (nuevoEstado === ESTADOS.DISPONIBLE) {
    DataManager.liberarMesa(mesaId);
  } else if (nuevoEstado === ESTADOS.CUENTA_SOLICITADA) {
    DataManager.actualizarEstadoMesa(mesaId, 'bill_requested', cart);
  } else {
    // SIN_PRODUCTOS, PEDIDO_PENDIENTE, PEDIDO_CONFIRMADO, COMANDA_ENVIADA, COMANDA_CON_AJUSTES
    DataManager.actualizarEstadoMesa(mesaId, 'occupied', cart);
  }

  render();
}

function handleIniciarPedido() {
  localStorage.removeItem('mesa_' + mesaId);
  DataManager.abrirMesa(mesaId, zona, personasParam, personasParam);
  cart = [];
  horaComanda = null;
  transicion(ESTADOS.SIN_PRODUCTOS);
}

function handlePrimary() {
  const pri = el('btn-primary');
  if (pri.classList.contains('disabled')) return;
  switch(estado) {
    case ESTADOS.DISPONIBLE:          handleIniciarPedido(); break;
    case ESTADOS.PEDIDO_PENDIENTE:    transicion(ESTADOS.PEDIDO_CONFIRMADO); break;
    case ESTADOS.PEDIDO_CONFIRMADO:   handleEnviarComanda(); break;
    case ESTADOS.COMANDA_ENVIADA:     handleSolicitarCuenta(); break;
    case ESTADOS.COMANDA_CON_AJUSTES: handleReenviarComanda(); break;
    case ESTADOS.CUENTA_SOLICITADA:
      location.href = `checkout.html?mesa=${mesaId}&zona=${zona}&estado=bill_requested`;
      break;
  }
}

function handleSecondary() { if (secondaryFn) secondaryFn(); }

function handleEnviarComanda() {
  const pri = el('btn-primary');
  const sec = el('btn-secondary');
  const tsNow = fmtHoraNow();
  pri.innerHTML = '<div class="spinner"></div>';
  pri.classList.add('disabled');
  sec.disabled = true;
  setTimeout(() => {
    sec.disabled = false;
    horaComanda = tsNow;
    transicion(ESTADOS.COMANDA_ENVIADA, { horaComanda });
  }, 1200);
}
function handleReenviarComanda() { handleEnviarComanda(); }

function handleSolicitarCuenta() {
  setMesaBillRequested();
  transicion(ESTADOS.CUENTA_SOLICITADA);
}

/* ══ Qty controls ══ */
function changeQty(productId, delta) {
  const item = cart.find(p => p.id === productId);
  if (!item) return;
  const newQty = item.cantidad + delta;
  if (newQty <= 0) { deleteItem(productId); return; }
  item.cantidad = newQty;
  persistProducts();
  markModifiedIfSent();
  render();
}
function deleteItem(productId) {
  cart = cart.filter(p => p.id !== productId);
  persistProducts();
  markModifiedIfSent();
  if (cart.length === 0) {
    transicion(ESTADOS.SIN_PRODUCTOS);
  } else {
    render();
  }
}
function markModifiedIfSent() {
  if (estado === ESTADOS.COMANDA_ENVIADA) {
    estado = ESTADOS.COMANDA_CON_AJUSTES;
    saveMsState(mesaId, { estado, horaComanda });
  }
}

/* ══ Info Drop Up ══ */
function openInfoDropUp()  { el('info-dropup-overlay').classList.add('show'); }
function closeInfoDropUp() { el('info-dropup-overlay').classList.remove('show'); }
function handleInfoDropUpClick(e) { if (e.target === el('info-dropup-overlay')) closeInfoDropUp(); }
function cambiarMesa() { alert('Cambio de mesa — próximamente'); }

/* ══ Cancel confirm ══ */
function abrirConfirmCancelar() { el('confirm-overlay').classList.add('show'); }
function closeCancelConfirm()   { el('confirm-overlay').classList.remove('show'); }
function ejecutarCancelar() {
  const btn  = el('btn-confirm-cancel-action');
  const text = el('btn-cancelar-text');
  const spin = el('spinner-cancelar');
  btn.disabled = true; spin.style.display = 'block'; text.textContent = 'Cancelando…';
  setTimeout(() => {
    DataManager.cerrarMesa(mesaId);
    localStorage.removeItem('boldPOS_comanda_' + mesaId);
    localStorage.removeItem('mesa_' + mesaId);
    location.href = 'venta-mesas.html?zona=' + encodeURIComponent(zona);
  }, 900);
}

/* ══ Init ══ */
(function init() {
  DataManager.init();
  el('nav-title').textContent = 'Mesa ' + mesaId;

  // ── If DataManager says available, mesa_{ID} may be stale — wipe it ──
  const dmCheck = DataManager.getMesa(mesaId);
  if (!dmCheck || dmCheck.estado === 'available') {
    localStorage.removeItem('mesa_' + mesaId);
  }

  // ── Read mesa_{ID} (source of truth for comanda state) ──
  const ms = loadMsState(mesaId);

  if (ms.estado) {
    // ── Restore from new format ──
    estado      = ms.estado;
    horaComanda = ms.horaComanda || null;
    // Products come from mesa_{ID} first; fall back to DataManager
    if (ms.productos && ms.productos.length > 0) {
      cart = ms.productos.map(p => ({ ...p }));
    } else {
      const dm = DataManager.getMesa(mesaId);
      cart = (dm && dm.productos && dm.productos.length > 0)
        ? dm.productos.map(p => ({ ...p }))
        : [];
    }
  } else {
    // ── Derive state from DataManager + migrate old comanda key ──
    const dm = DataManager.getMesa(mesaId);
    if (!dm || dm.estado === 'available') {
      estado = ESTADOS.DISPONIBLE;
      cart   = [];
    } else if (dm.estado === 'bill_requested') {
      estado = ESTADOS.CUENTA_SOLICITADA;
      cart   = dm.productos.map(p => ({ id: p.id, nombre: p.nombre, precio: p.precio, cantidad: p.cantidad }));
    } else {
      // occupied — try migrating old comanda state
      const oldCs = (() => {
        try { return JSON.parse(localStorage.getItem('boldPOS_comanda_' + mesaId)) || {}; } catch(e) { return {}; }
      })();
      cart = (dm.productos || []).map(p => ({ ...p }));
      if (oldCs.estado === 'confirmed') {
        estado = ESTADOS.PEDIDO_CONFIRMADO;
      } else if (oldCs.estado === 'sent') {
        estado = ESTADOS.COMANDA_ENVIADA;
        horaComanda = oldCs.hora ? (()=>{ const d=new Date(oldCs.hora); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); })() : null;
      } else if (oldCs.estado === 'modified') {
        estado = ESTADOS.COMANDA_CON_AJUSTES;
      } else if (cart.length > 0) {
        estado = ESTADOS.PEDIDO_PENDIENTE;
      } else {
        estado = ESTADOS.SIN_PRODUCTOS;
      }
    }
    // Persist derived state so next load uses the fast path
    saveMsState(mesaId, { estado, horaComanda, productos: cart });
  }

  console.log(`Mesa ${mesaId}: leyendo localStorage → estado: ${estado}, productos: ${cart.length}`);

  render();
})();

window.addEventListener('pageshow', function() {
  const ms = loadMsState(mesaId);
  if (ms && ms.productos) {
    cart = ms.productos.map(p => ({ ...p }));
  }
  render();
});

updateClock(); setInterval(updateClock, 30000);
</script>
</body>
</html>

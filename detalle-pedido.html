<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>BoldPOS — Detalle Pedido</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue-100:        #121e6c;
      --blue-10:         #f1f2f6;
      --coral-100:       #ff2947;
      --black-0:         #ffffff;
      --black-10:        #f3f3f3;
      --black-40:        #969696;
      --black-60:        #606060;
      --black-100:       #1e1e1e;
      --background-page: #f7f8fb;
      --font:            'Montserrat', sans-serif;
      --shadow-blue-8:   0px 8px 20px rgba(18,30,108,0.08);
      --radius-card:     16px;
      --radius-pill:     100px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: #d0d0d0;
      display: flex; justify-content: center; align-items: flex-start;
    }
    /* Phone shell — flex column, no overflow on shell */
    #app {
      width: 393px; height: 100vh;
      background: var(--background-page);
      display: flex; flex-direction: column;
      overflow: hidden; position: relative;
    }

    /* ─── Status bar ─── */
    #status-bar {
      background: transparent; display: flex; align-items: center;
      padding: 8px 8px 0; flex-shrink: 0;
    }
    .sb-left  { display:flex; align-items:center; gap:4px; font-size:11px; font-weight:600; color:var(--black-100); }
    .sb-right { margin-left:auto; display:flex; align-items:center; }

    /* ─── Header ─── */
    #header { background: transparent; flex-shrink: 0; margin-top: 12px; }
    #nav-row {
      height: 52px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 16px;
    }
    #btn-back {
      width: 32px; height: 32px; border: none; background: transparent;
      cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; -webkit-tap-highlight-color: transparent;
      border-radius: 8px; transition: background .12s;
    }
    #btn-back:active { background: var(--blue-10); }
    #nav-title-group {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px;
    }
    #nav-title { font-size: 16px; font-weight: 700; color: var(--blue-100); line-height: 20px; }
    #nav-spacer { width: 32px; flex-shrink: 0; }

    /* ─── Badge de estado (en header) ─── */
    .badge-estado {
      display: inline-flex; align-items: center; gap: 5px;
      border-radius: 100px; padding: 3px 10px; flex-shrink: 0;
    }
    .badge-estado .badge-text { font-size: 11px; font-weight: 600; line-height: 16px; white-space: nowrap; }
    .badge-occupied          { background: #FEE2E2; }
    .badge-occupied .badge-text   { color: #FF2947; }
    .badge-bill              { background: #fde8e8; }
    .badge-bill .badge-text       { color: #c0392b; }
    .badge-available         { background: #D1FAE5; }
    .badge-available .badge-text  { color: #065F46; }

    /* Pulse dot para cuenta solicitada */
    .pulse-dot { display: none; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .badge-bill .pulse-dot {
      display: inline-block; background: #c0392b;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.5); opacity: 0.6; }
    }

    /* ─── Mesa info card ─── */
    #mesa-info-card {
      margin: 8px 16px 0; background: var(--black-0);
      border: 1px solid #E8E9F0; border-radius: 12px;
      padding: 10px 12px; display: flex; align-items: center; flex-shrink: 0;
    }
    .info-item { display: flex; align-items: center; gap: 4px; flex: 1; min-width: 0; }
    .info-val {
      font-size: 12px; font-weight: 500; color: var(--black-100);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .info-sep { width: 1px; height: 20px; background: #E8E9F0; flex-shrink: 0; margin: 0 5px; }
    #btn-dots-info {
      width: 28px; height: 28px; border: none; background: transparent;
      cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-left: 4px; -webkit-tap-highlight-color: transparent;
      border-radius: 6px; transition: background .12s;
    }
    #btn-dots-info:active { background: var(--blue-10); }

    /* ─── Section title ─── */
    #pedido-title {
      padding: 14px 16px 0; font-size: 11px; font-weight: 700;
      color: var(--black-40); letter-spacing: 0.08em; text-transform: uppercase; flex-shrink: 0;
    }

    /* ─── Products area — scrollable ─── */
    #products-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      scrollbar-width: none;
      display: flex;
      flex-direction: column;
      min-height: 0; /* needed for flex scroll to work in some browsers */
    }
    #products-area::-webkit-scrollbar { display: none; }

    /* Empty state */
    #empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px; padding: 24px 32px;
    }
    .empty-icon { color: #CBD5E1; }
    .empty-label { font-size: 15px; font-weight: 600; color: var(--black-60); text-align: center; }
    #btn-empty-agregar {
      margin-top: 6px; height: 48px; padding: 0 28px;
      border-radius: var(--radius-pill); border: none;
      background: var(--coral-100); color: var(--black-0);
      font-family: var(--font); font-size: 14px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity .15s; -webkit-tap-highlight-color: transparent;
    }
    #btn-empty-agregar:active { opacity: 0.85; }

    /* Product list */
    #products-list {
      background: var(--black-0); border-radius: var(--radius-card);
      overflow: hidden; box-shadow: var(--shadow-blue-8); padding: 0 14px;
    }
    .product-item {
      background: var(--black-0); padding: 12px 0;
      display: flex; flex-direction: column; gap: 4px;
    }
    .product-item + .product-item { border-top: 1px solid #EEF0F8; }
    .product-row-top { display: flex; align-items: center; gap: 8px; }
    .product-name {
      font-size: 14px; font-weight: 600; color: var(--black-100);
      flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .qty-controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .qty-btn {
      width: 28px; height: 28px; border-radius: 100px;
      border: 1.5px solid #E8E9F0; background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px; font-weight: 600; color: var(--black-100);
      -webkit-tap-highlight-color: transparent; transition: background .12s; padding: 0; line-height: 1;
    }
    .qty-btn:active { background: var(--blue-10); }
    .qty-num {
      font-size: 14px; font-weight: 600; color: var(--black-100);
      min-width: 24px; text-align: center;
    }
    /* Read-only quantity chip (cuenta solicitada) */
    .qty-readonly {
      font-size: 13px; font-weight: 600; color: var(--black-60);
      background: #F3F4F6; border-radius: 6px;
      padding: 2px 8px; flex-shrink: 0;
    }
    .btn-delete {
      width: 28px; height: 28px; border: none; background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; padding: 0; -webkit-tap-highlight-color: transparent;
      border-radius: 8px; transition: background .12s; flex-shrink: 0;
    }
    .btn-delete:active { background: #FEE2E2; }
    .product-row-bottom { font-size: 12px; font-weight: 400; color: var(--black-60); }

    /* ─── Footer — fixed at bottom ─── */
    #footer {
      background: var(--black-0); border-top: 1px solid rgba(0,0,0,0.08);
      padding: 12px 16px 20px; flex-shrink: 0; display: flex; flex-direction: column;
    }
    #totals-wrap { display: flex; flex-direction: column; }
    .totals-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
    .totals-label { font-size: 13px; font-weight: 500; color: var(--black-60); }
    .totals-amount { font-size: 13px; font-weight: 500; color: var(--black-100); }
    .totals-sep { height: 1px; background: #EEF0F8; margin: 5px 0; }
    .totals-row-total .totals-label { font-size: 15px; font-weight: 700; color: var(--black-100); }
    .totals-row-total .totals-amount { font-size: 18px; font-weight: 700; color: var(--blue-100); }

    /* ─── Status tag (above buttons) ─── */
    #comanda-status-tag {
      display: none;
      align-items: center; gap: 6px;
      padding: 7px 12px; border-radius: 8px;
      font-family: var(--font); font-size: 12px; font-weight: 600;
      margin-top: 10px;
    }
    #comanda-status-tag.sent-tag     { display: flex; background: #f0faf5; color: #1a7a4e; }
    #comanda-status-tag.modified-tag { display: flex; background: #fff8e6; color: #b07d00; }

    /* ─── Action bar ─── */
    #action-bar { margin-top: 10px; display: flex; gap: 10px; }
    #btn-secondary {
      flex: 1; height: 48px; border-radius: var(--radius-pill);
      border: 1.5px solid rgba(18,30,108,0.2); background: transparent;
      font-family: var(--font); font-size: 14px; font-weight: 600; color: var(--blue-100);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s; -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    #btn-secondary:active { background: var(--blue-10); }
    /* Red outline variant */
    #btn-secondary.red {
      border-color: rgba(255,41,71,0.3);
      color: #FF2947;
    }
    #btn-secondary.red:active { background: #fff0f1; }

    #btn-primary {
      flex: 1; height: 48px; border-radius: var(--radius-pill); border: none;
      font-family: var(--font); font-size: 14px; font-weight: 600; color: var(--black-0);
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .15s; -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    #btn-primary:active:not(.disabled) { opacity: 0.85; }
    #btn-primary.disabled { opacity: 0.38; cursor: not-allowed; }
    #btn-primary.coral  { background: var(--coral-100); }
    #btn-primary.blue   { background: var(--blue-100); }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Info Drop Up ─── */
    #info-dropup-overlay {
      display: none; position: absolute; inset: 0; z-index: 300;
      background: rgba(0,0,0,.45); align-items: flex-end;
    }
    #info-dropup-overlay.show { display: flex; }
    #info-dropup-sheet {
      width: 100%; background: var(--black-0); border-radius: 24px 24px 0 0;
      padding: 8px 0 32px; transform: translateY(100%); transition: transform 200ms ease;
    }
    #info-dropup-overlay.show #info-dropup-sheet { transform: translateY(0); }
    #info-dropup-handle { width: 36px; height: 4px; background: #D1D5DB; border-radius: 2px; margin: 0 auto 16px; }
    #info-dropup-title-row { padding: 0 20px 14px; }
    #info-dropup-heading { font-size: 16px; font-weight: 700; color: var(--blue-100); }
    #info-dropup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 8px; padding: 0 20px 16px; }
    .du-item { display: flex; flex-direction: column; gap: 2px; }
    .du-label { font-size: 11px; font-weight: 400; color: var(--black-40); line-height: 14px; }
    .du-val   { font-size: 13px; font-weight: 600; color: var(--black-100); line-height: 18px; }
    #info-dropup-sep { height: 1px; background: rgba(0,0,0,.07); margin: 0 20px 8px; }
    .du-action {
      width: 100%; display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; border: none; background: transparent;
      font-family: var(--font); font-size: 15px; font-weight: 500; color: var(--black-100);
      cursor: pointer; text-align: left; -webkit-tap-highlight-color: transparent;
    }
    .du-action:active { background: var(--blue-10); }
    .du-action.du-action-red { color: #FF2947; }

    /* ─── Confirm modal ─── */
    #confirm-overlay {
      display: none; position: absolute; inset: 0; z-index: 350;
      background: rgba(0,0,0,.5); align-items: center; justify-content: center; padding: 24px;
    }
    #confirm-overlay.show { display: flex; }
    #confirm-modal {
      background: var(--black-0); border-radius: 20px; padding: 28px 24px 24px; width: 100%;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      box-shadow: 0 24px 48px rgba(0,0,0,.2);
    }
    #confirm-warning-icon {
      width: 52px; height: 52px; border-radius: 16px; background: #FFF0F1;
      display: flex; align-items: center; justify-content: center; margin-bottom: 4px;
    }
    #confirm-title  { font-size: 17px; font-weight: 700; color: var(--blue-100); text-align: center; line-height: 24px; }
    #confirm-body   { font-size: 13px; font-weight: 400; color: var(--black-60); text-align: center; line-height: 20px; }
    #confirm-btns   { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: 8px; }
    #btn-confirm-cancel-action {
      width: 100%; height: 48px; border-radius: var(--radius-pill); border: none;
      background: #FF2947; color: #fff; font-family: var(--font); font-size: 15px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .15s;
    }
    #btn-confirm-cancel-action:active { opacity: 0.85; }
    #btn-confirm-keep {
      width: 100%; height: 44px; border-radius: var(--radius-pill);
      border: 1.5px solid rgba(18,30,108,.15); background: transparent; color: var(--blue-100);
      font-family: var(--font); font-size: 15px; font-weight: 500; cursor: pointer; transition: background .15s;
    }
    #btn-confirm-keep:active { background: var(--blue-10); }
  </style>
</head>
<body>
<div id="app">

  <!-- Status bar -->
  <div id="status-bar">
    <div class="sb-left"><span id="sb-time">9:41</span></div>
    <div class="sb-right">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="8" width="3" height="4" rx="1" fill="#1e1e1e"/>
        <rect x="4.5" y="5.5" width="3" height="6.5" rx="1" fill="#1e1e1e"/>
        <rect x="9" y="3" width="3" height="9" rx="1" fill="#1e1e1e"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="#1e1e1e"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none" style="margin-left:5px">
        <path d="M8 9.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5z" fill="#1e1e1e"/>
        <path d="M8 6.5C9.66 6.5 11.16 7.17 12.25 8.25L13.31 7.19A7 7 0 0 0 8 5a7 7 0 0 0-5.31 2.19l1.06 1.06A5 5 0 0 1 8 6.5z" fill="#1e1e1e"/>
        <path d="M8 3.5c2.48 0 4.73 1 6.36 2.63l1.06-1.06A9.95 9.95 0 0 0 8 2a9.95 9.95 0 0 0-7.42 3.07L1.64 6.13A8 8 0 0 1 8 3.5z" fill="#1e1e1e"/>
      </svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none" style="margin-left:5px">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#1e1e1e" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="16" height="8" rx="2" fill="#1e1e1e"/>
        <path d="M23 4v4a2 2 0 0 0 0-4z" fill="#1e1e1e" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Header: ← [Mesa + badge] [spacer] -->
  <div id="header">
    <div id="nav-row">
      <button id="btn-back" onclick="goBack()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M15 18l-6-6 6-6" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div id="nav-title-group">
        <span id="nav-title">Cargando…</span>
        <div class="badge-estado badge-occupied" id="badge-estado">
          <span class="pulse-dot"></span>
          <span class="badge-text" id="badge-estado-text">Ocupada</span>
        </div>
      </div>
      <div id="nav-spacer"></div>
    </div>
  </div>

  <!-- Info card: zona · personas · apertura · tiempo · ⋯ -->
  <div id="mesa-info-card">
    <div class="info-item">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="#606060" stroke-width="1.6"/>
        <circle cx="12" cy="9" r="2.5" stroke="#606060" stroke-width="1.6"/>
      </svg>
      <span class="info-val" id="du-zona">—</span>
    </div>
    <div class="info-sep"></div>
    <div class="info-item">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
        <circle cx="9" cy="7" r="3" stroke="#606060" stroke-width="1.6"/>
        <path d="M3 21v-1a6 6 0 0 1 6-6h0a6 6 0 0 1 6 6v1" stroke="#606060" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="#606060" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M21 21v-1a4 4 0 0 0-3-3.85" stroke="#606060" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span class="info-val" id="du-personas">—</span>
    </div>
    <div class="info-sep"></div>
    <div class="info-item">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
        <circle cx="12" cy="12" r="9" stroke="#606060" stroke-width="1.6"/>
        <path d="M12 7v5l3 3" stroke="#606060" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span class="info-val" id="du-apertura">—</span>
    </div>
    <div class="info-sep"></div>
    <div class="info-item">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
        <circle cx="12" cy="13" r="8" stroke="#606060" stroke-width="1.6"/>
        <path d="M12 9v4l2.5 2.5" stroke="#606060" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M9 2h6M12 2v3" stroke="#606060" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span class="info-val" id="du-tiempo">—</span>
    </div>
    <button id="btn-dots-info" onclick="openInfoDropUp()" aria-label="Más acciones">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <circle cx="5"  cy="12" r="1.5" fill="#606060"/>
        <circle cx="12" cy="12" r="1.5" fill="#606060"/>
        <circle cx="19" cy="12" r="1.5" fill="#606060"/>
      </svg>
    </button>
  </div>

  <!-- Section title -->
  <div id="pedido-title">PEDIDO</div>

  <!-- Scrollable products area -->
  <div id="products-area">
    <div id="empty-state">
      <svg class="empty-icon" width="72" height="72" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
        <line x1="9"  y1="12" x2="15" y2="12"/>
        <line x1="9"  y1="16" x2="13" y2="16"/>
      </svg>
      <span class="empty-label">Sin productos aún</span>
      <button id="btn-empty-agregar" onclick="goToAgregar()">Agregar productos</button>
    </div>
    <div id="products-list" style="display:none"></div>
  </div>

  <!-- Fixed footer: totals + status tag + buttons -->
  <div id="footer">
    <div id="totals-wrap">
      <div class="totals-row">
        <span class="totals-label">Subtotal</span>
        <span class="totals-amount" id="val-subtotal">$0</span>
      </div>
      <div class="totals-row">
        <span class="totals-label">IVA (19%)</span>
        <span class="totals-amount" id="val-iva">$0</span>
      </div>
      <div class="totals-sep"></div>
      <div class="totals-row totals-row-total">
        <span class="totals-label">Total</span>
        <span class="totals-amount" id="val-total">$0</span>
      </div>
    </div>
    <!-- Comanda status tag (sent / modified) -->
    <div id="comanda-status-tag"></div>
    <!-- Action buttons -->
    <div id="action-bar">
      <button id="btn-secondary" onclick="onSecondary()">—</button>
      <button id="btn-primary"   onclick="handlePrimary()">Cargando…</button>
    </div>
  </div>

  <!-- Info Drop Up -->
  <div id="info-dropup-overlay" onclick="handleInfoDropUpClick(event)">
    <div id="info-dropup-sheet">
      <div id="info-dropup-handle"></div>
      <div id="info-dropup-title-row">
        <span id="info-dropup-heading">Detalle de mesa</span>
      </div>
      <div id="info-dropup-grid">
        <div class="du-item"><span class="du-label">Zona</span><span class="du-val" id="dropup-zona">—</span></div>
        <div class="du-item"><span class="du-label">Personas</span><span class="du-val" id="dropup-personas">—</span></div>
        <div class="du-item"><span class="du-label">Hora apertura</span><span class="du-val" id="dropup-apertura">—</span></div>
        <div class="du-item"><span class="du-label">Tiempo en mesa</span><span class="du-val" id="dropup-tiempo">—</span></div>
      </div>
      <div id="info-dropup-sep"></div>
      <button class="du-action" onclick="closeInfoDropUp(); cambiarMesa();">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M5 12h14M15 6l6 6-6 6" stroke="#1e1e1e" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Cambiar mesa
      </button>
      <button class="du-action du-action-red" onclick="closeInfoDropUp(); abrirConfirmCancelar();">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <polyline points="3 6 5 6 21 6" stroke="#FF2947" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" stroke="#FF2947" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M10 11v6M14 11v6" stroke="#FF2947" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        Cancelar y liberar mesa
      </button>
    </div>
  </div>

  <!-- Confirm modal -->
  <div id="confirm-overlay">
    <div id="confirm-modal">
      <div id="confirm-warning-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" stroke="#FF2947" stroke-width="1.8" stroke-linejoin="round"/>
          <line x1="12" y1="9" x2="12" y2="13" stroke="#FF2947" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="12" cy="17" r="1" fill="#FF2947"/>
        </svg>
      </div>
      <p id="confirm-title">¿Cancelar y liberar mesa?</p>
      <p id="confirm-body">Se eliminará todo el pedido y la mesa quedará disponible. Esta acción no se puede deshacer.</p>
      <div id="confirm-btns">
        <button id="btn-confirm-cancel-action" onclick="ejecutarCancelar()">
          <div class="spinner" id="spinner-cancelar"></div>
          <span id="btn-cancelar-text">Sí, cancelar pedido</span>
        </button>
        <button id="btn-confirm-keep" onclick="closeCancelConfirm()">Mantener pedido</button>
      </div>
    </div>
  </div>

</div><!-- /app -->

<script src="data-manager.js"></script>
<script>
/* ══ URL params ══ */
const params        = new URLSearchParams(location.search);
const mesaId        = params.get("mesa")      || "S05";
const zona          = params.get("zona")      || "salon";
const estadoParam   = params.get("estado")    || "occupied";
const personasParam = parseInt(params.get("personas")) || 2;

/* ══ App state ══ */
let cart         = [];   // { id, nombre, precio, cantidad }
let comandaState = "pending";  // "pending"|"confirmed"|"sent"|"modified"
let mesaEstado   = estadoParam;

/* Dispatcher for secondary button — set by renderActionBar */
let secondaryAction = null;
function onSecondary() { if (secondaryAction) secondaryAction(); }

/* ══ Comanda helpers ══ */
function loadComandaState(id) {
  try { return JSON.parse(localStorage.getItem("boldPOS_comanda_" + id)) || { estado:"pending", hora:null }; }
  catch(e) { return { estado:"pending", hora:null }; }
}
function saveComandaState(id, estado, hora) {
  localStorage.setItem("boldPOS_comanda_" + id, JSON.stringify({ estado, hora }));
}

/* ══ Storage helpers ══ */
function updateProductQty(mId, productId, newQty) {
  try {
    const data = JSON.parse(localStorage.getItem("boldPOS_mesas")) || {};
    if (data[mId] && data[mId].productos) {
      if (newQty <= 0) {
        data[mId].productos = data[mId].productos.filter(p => p.id !== productId);
      } else {
        const p = data[mId].productos.find(p => p.id === productId);
        if (p) p.cantidad = newQty;
      }
      data[mId].total = data[mId].productos.reduce((s,p) => s + p.precio * p.cantidad, 0);
      localStorage.setItem("boldPOS_mesas", JSON.stringify(data));
    }
  } catch(e) {}
}

function setMesaBillRequested(mId) {
  try {
    const data = JSON.parse(localStorage.getItem("boldPOS_mesas")) || {};
    if (data[mId]) {
      data[mId].estado = "bill_requested";
      localStorage.setItem("boldPOS_mesas", JSON.stringify(data));
    }
  } catch(e) {}
}

/* ══ Formatting ══ */
function fmtApertura(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  let h = d.getHours();
  const min = String(d.getMinutes()).padStart(2,"0");
  const ampm = h >= 12 ? "p.m." : "a.m.";
  h = h % 12 || 12;
  return `${h}:${min} ${ampm}`;
}
function fmtHora(iso) {
  const d = new Date(iso);
  return d.getHours().toString().padStart(2,"0") + ":" + d.getMinutes().toString().padStart(2,"0");
}
function fmtMoney(n) { return "$" + n.toLocaleString("es-CO"); }
function escHtml(s)  { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* ══ Navigation ══ */
function goBack() { location.href = "venta-mesas.html"; }

function goToAgregar() {
  const p = new URLSearchParams({ mesa: mesaId, zona, estado: mesaEstado, origen: "pedido" });
  location.href = "detalle-mesa.html?" + p.toString();
}

/* ══ Render header badge ══ */
function renderBadge(curEstado) {
  const badge    = document.getElementById("badge-estado");
  const badgeTxt = document.getElementById("badge-estado-text");
  if (curEstado === "bill_requested") {
    badge.className  = "badge-estado badge-bill";
    badgeTxt.textContent = "Cuenta solicitada";
  } else if (curEstado === "available") {
    badge.className  = "badge-estado badge-available";
    badgeTxt.textContent = "Disponible";
  } else {
    badge.className  = "badge-estado badge-occupied";
    badgeTxt.textContent = "Ocupada";
  }
}

/* ══ Render info card ══ */
function renderInfoCard(mesa) {
  const zonaLabel = { salon:"Salón", terraza:"Terraza", barra:"Barra" };
  const zText     = zonaLabel[zona] || zona;
  document.getElementById("du-zona").textContent     = zText;
  document.getElementById("du-personas").textContent = mesa ? (mesa.personas || "—") + " pers." : "—";
  document.getElementById("du-apertura").textContent = mesa ? fmtApertura(mesa.horaApertura) : "—";
  document.getElementById("du-tiempo").textContent   = (mesa && mesa.horaApertura) ? DataManager.calcTime(mesa.horaApertura) : "—";
  document.getElementById("dropup-zona").textContent     = zText;
  document.getElementById("dropup-personas").textContent = mesa ? (mesa.personas || "—") + " pers." : "—";
  document.getElementById("dropup-apertura").textContent = mesa ? fmtApertura(mesa.horaApertura) : "—";
  document.getElementById("dropup-tiempo").textContent   = (mesa && mesa.horaApertura) ? DataManager.calcTime(mesa.horaApertura) : "—";
  renderBadge((mesa && mesa.estado) || mesaEstado);
}

/* ══ Render action bar ══
 *
 *  States:
 *  DISPONIBLE       → [Abrir mesa] (coral, full)
 *  PEDIDO_PENDIENTE → [Confirmar pedido] (coral, full, disabled if empty)
 *  PEDIDO_CONF.     → [Solicitar cuenta] outline-red  [Enviar comanda] coral
 *  COMANDA_ENVIADA  → tag ✓  [Reenviar comanda] outline-red  [Solicitar cuenta] coral
 *  COMANDA_AJUSTES  → tag ⚠  [Solicitar cuenta] outline-red  [Reenviar comanda] coral
 *  CUENTA_SOL.      → [Reenviar comanda] outline-red  [Cobrar mesa] coral
 */
function renderActionBar() {
  const sec       = document.getElementById("btn-secondary");
  const pri       = document.getElementById("btn-primary");
  const statusTag = document.getElementById("comanda-status-tag");
  const mesa      = DataManager.getMesa(mesaId);
  const curEstado = (mesa && mesa.estado) || mesaEstado;
  const cs        = loadComandaState(mesaId);
  comandaState    = cs.estado;
  const isEmpty   = cart.length === 0;

  // Reset tag
  statusTag.className = "";
  statusTag.innerHTML = "";

  // Helper: configure primary as full-width single button
  function singleBtn(cls, label) {
    sec.style.display = "none";
    pri.style.flex    = "unset";
    pri.style.width   = "100%";
    pri.className     = cls;
    pri.innerHTML     = label;
    secondaryAction   = null;
  }

  // Helper: configure dual-button layout
  function dualBtn(secCls, secLabel, secFn, priCls, priLabel) {
    sec.style.display = "flex";
    sec.className     = secCls;
    sec.textContent   = secLabel;
    secondaryAction   = secFn;
    pri.style.flex    = "1";
    pri.style.width   = "";
    pri.className     = priCls;
    pri.innerHTML     = priLabel;
  }

  /* DISPONIBLE */
  if (curEstado === "available") {
    singleBtn("coral", "Abrir mesa");
    return;
  }

  /* CUENTA_SOLICITADA */
  if (curEstado === "bill_requested") {
    dualBtn("red", "Reenviar comanda", handleReenviarComanda, "coral", "Cobrar mesa");
    return;
  }

  /* Occupied — dispatch on comanda state */

  /* PEDIDO_PENDIENTE */
  if (comandaState === "pending") {
    singleBtn(isEmpty ? "coral disabled" : "coral", "Confirmar pedido");
    return;
  }

  /* PEDIDO_CONFIRMADO */
  if (comandaState === "confirmed") {
    dualBtn("red", "Solicitar cuenta", handleSolicitarCuenta, "coral", "Enviar comanda");
    return;
  }

  /* COMANDA_ENVIADA */
  if (comandaState === "sent") {
    statusTag.className = "sent-tag";
    const hora = cs.hora ? " · " + fmtHora(cs.hora) : "";
    statusTag.innerHTML = `<span>✓</span><span>Comanda enviada${hora}</span>`;
    dualBtn("red", "Reenviar comanda", handleReenviarComanda, "coral", "Solicitar cuenta");
    return;
  }

  /* COMANDA_CON_AJUSTES */
  if (comandaState === "modified") {
    statusTag.className = "modified-tag";
    statusTag.innerHTML = `<span>⚠</span><span>Cambios pendientes</span>`;
    dualBtn("red", "Solicitar cuenta", handleSolicitarCuenta, "coral", "Reenviar comanda");
    return;
  }
}

/* ══ Render product list ══ */
function renderList() {
  const list       = document.getElementById("products-list");
  const emptyEl    = document.getElementById("empty-state");
  const totalsWrap = document.getElementById("totals-wrap");
  const emptyAgr   = document.getElementById("btn-empty-agregar");
  const mesa       = DataManager.getMesa(mesaId);
  const curEstado  = (mesa && mesa.estado) || mesaEstado;
  const isReadOnly = curEstado === "bill_requested";

  if (!cart.length) {
    list.style.display       = "none";
    emptyEl.style.display    = "flex";
    totalsWrap.style.display = "none";
    emptyAgr.style.display   = curEstado === "available" ? "none" : "flex";
  } else {
    list.style.display       = "block";
    emptyEl.style.display    = "none";
    totalsWrap.style.display = "";
  }

  list.innerHTML = cart.map(item => {
    const sub  = fmtMoney(item.precio * item.cantidad);
    const unit = fmtMoney(item.precio);

    const controls = isReadOnly
      ? `<span class="qty-readonly">× ${item.cantidad}</span>`
      : `<div class="qty-controls">
           <button class="qty-btn" onclick="changeQty('${item.id}',-1)">−</button>
           <span class="qty-num">${item.cantidad}</span>
           <button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>
         </div>
         <button class="btn-delete" onclick="deleteItem('${item.id}')">
           <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
             <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="#969696" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
           </svg>
         </button>`;

    return `
      <div class="product-item">
        <div class="product-row-top">
          <span class="product-name">${escHtml(item.nombre)}</span>
          ${controls}
        </div>
        <div class="product-row-bottom">${unit} × ${item.cantidad} = ${sub}</div>
      </div>`;
  }).join("");

  renderTotals();
  renderActionBar();
}

/* ══ Render totals ══ */
function renderTotals() {
  const subtotal = cart.reduce((s,p) => s + p.precio * p.cantidad, 0);
  const iva      = Math.round(subtotal * 0.19);
  document.getElementById("val-subtotal").textContent = fmtMoney(subtotal);
  document.getElementById("val-iva").textContent      = fmtMoney(iva);
  document.getElementById("val-total").textContent    = fmtMoney(subtotal + iva);
}

/* ══ Quantity controls ══ */
function changeQty(productId, delta) {
  const item = cart.find(p => p.id === productId);
  if (!item) return;
  const newQty = item.cantidad + delta;
  if (newQty <= 0) { deleteItem(productId); return; }
  item.cantidad = newQty;
  updateProductQty(mesaId, productId, newQty);
  _markModifiedIfSent();
  renderList();
}
function deleteItem(productId) {
  cart = cart.filter(p => p.id !== productId);
  updateProductQty(mesaId, productId, 0);
  _markModifiedIfSent();
  renderList();
}
function _markModifiedIfSent() {
  if (comandaState === "sent") {
    const cs = loadComandaState(mesaId);
    saveComandaState(mesaId, "modified", cs.hora);
    comandaState = "modified";
  }
}

/* ══ Action handlers ══ */

function handlePrimary() {
  const pri = document.getElementById("btn-primary");
  if (pri.classList.contains("disabled")) return;

  const mesa      = DataManager.getMesa(mesaId);
  const curEstado = (mesa && mesa.estado) || mesaEstado;
  const cs        = loadComandaState(mesaId);

  /* DISPONIBLE → abrir mesa */
  if (curEstado === "available") {
    DataManager.abrirMesa(mesaId, zona, personasParam, personasParam);
    mesaEstado = "occupied";
    location.href = `detalle-mesa.html?mesa=${mesaId}&zona=${zona}&estado=occupied&origen=nueva`;
    return;
  }

  /* CUENTA_SOLICITADA → cobrar */
  if (curEstado === "bill_requested") {
    location.href = `checkout.html?mesa=${mesaId}&zona=${zona}&estado=bill_requested`;
    return;
  }

  /* PEDIDO_PENDIENTE → confirmar pedido */
  if (cs.estado === "pending") {
    saveComandaState(mesaId, "confirmed", null);
    comandaState = "confirmed";
    renderList();
    return;
  }

  /* PEDIDO_CONFIRMADO → enviar comanda */
  if (cs.estado === "confirmed") {
    handleEnviarComanda();
    return;
  }

  /* COMANDA_CON_AJUSTES → reenviar */
  if (cs.estado === "modified") {
    handleReenviarComanda();
    return;
  }

  /* COMANDA_ENVIADA → solicitar cuenta */
  if (cs.estado === "sent") {
    handleSolicitarCuenta();
    return;
  }
}

function handleEnviarComanda() {
  const pri = document.getElementById("btn-primary");
  pri.innerHTML = '<div class="spinner"></div>';
  pri.classList.add("disabled");
  const sec = document.getElementById("btn-secondary");
  sec.disabled = true;
  setTimeout(() => {
    sec.disabled = false;
    saveComandaState(mesaId, "sent", new Date().toISOString());
    comandaState = "sent";
    renderList();
  }, 1200);
}

function handleReenviarComanda() {
  handleEnviarComanda();
}

function handleSolicitarCuenta() {
  const cs = loadComandaState(mesaId);
  setMesaBillRequested(mesaId);
  mesaEstado = "bill_requested";
  // Keep existing hora so comanda timestamp survives
  saveComandaState(mesaId, "sent", cs.hora);
  renderBadge("bill_requested");
  renderInfoCard(DataManager.getMesa(mesaId));
  renderList();
}

/* ══ Info Drop Up ══ */
function openInfoDropUp()  { document.getElementById("info-dropup-overlay").classList.add("show"); }
function closeInfoDropUp() { document.getElementById("info-dropup-overlay").classList.remove("show"); }
function handleInfoDropUpClick(e) {
  if (e.target === document.getElementById("info-dropup-overlay")) closeInfoDropUp();
}
function cambiarMesa() { alert("Cambio de mesa — próximamente"); }

/* ══ Cancel confirm ══ */
function abrirConfirmCancelar() { document.getElementById("confirm-overlay").classList.add("show"); }
function closeCancelConfirm()   { document.getElementById("confirm-overlay").classList.remove("show"); }
function ejecutarCancelar() {
  const btn  = document.getElementById("btn-confirm-cancel-action");
  const text = document.getElementById("btn-cancelar-text");
  const spin = document.getElementById("spinner-cancelar");
  btn.disabled = true; spin.style.display = "block"; text.textContent = "Cancelando…";
  setTimeout(() => {
    DataManager.cerrarMesa(mesaId);
    localStorage.removeItem("boldPOS_comanda_" + mesaId);
    location.href = "venta-mesas.html";
  }, 900);
}

/* ══ Clock ══ */
function updateClock() {
  const now = new Date();
  document.getElementById("sb-time").textContent =
    now.getHours() + ":" + String(now.getMinutes()).padStart(2,"0");
}
updateClock(); setInterval(updateClock, 30000);

/* ══ Init ══ */
(function init() {
  DataManager.init();
  document.getElementById("nav-title").textContent = "Mesa " + mesaId;

  /* DISPONIBLE */
  if (estadoParam === "available") {
    mesaEstado = "available";
    renderBadge("available");
    renderInfoCard(null);
    renderList();
    return;
  }

  const mesa = DataManager.getMesa(mesaId);
  if (!mesa) {
    mesaEstado = estadoParam;
    renderBadge(estadoParam);
    renderInfoCard(null);
    renderTotals();
    renderActionBar();
    return;
  }

  mesaEstado = mesa.estado || estadoParam;
  cart = (mesa.productos || []).map(p => ({
    id: p.id, nombre: p.nombre, precio: p.precio, cantidad: p.cantidad
  }));

  const cs = loadComandaState(mesaId);
  // If mesa is bill_requested but comanda state is pre-sent, elevate to sent
  if (mesaEstado === "bill_requested" && (cs.estado === "pending" || cs.estado === "confirmed")) {
    saveComandaState(mesaId, "sent", new Date().toISOString());
  }
  comandaState = loadComandaState(mesaId).estado;

  renderInfoCard(mesa);
  renderList();
})();
</script>

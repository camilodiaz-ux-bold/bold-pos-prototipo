<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>BoldPOS — Agregar Productos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ─── Merlin Design Tokens ─── */
    :root {
      --blue-100:        #121e6c;
      --blue-10:         #f1f2f6;
      --coral-100:       #ff2947;
      --black-0:         #ffffff;
      --black-10:        #f3f3f3;
      --black-40:        #969696;
      --black-60:        #606060;
      --black-100:       #1e1e1e;
      --background-page: #f7f8fb;
      --font:            'Montserrat', sans-serif;
      --shadow-blue-8:   0px 8px 20px rgba(18,30,108,0.08);
      --radius-card:     16px;
      --radius-pill:     100px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: #d0d0d0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* ─── Phone shell ─── */
    #app {
      width: 393px;
      height: 100vh;
      background: var(--background-page);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ─── Status bar ─── */
    #status-bar {
      background: transparent;
      display: flex;
      align-items: center;
      padding: 8px 8px 0;
      flex-shrink: 0;
      position: relative;
    }
    .sb-left   { display:flex; align-items:center; gap:4px; font-size:11px; font-weight:600; color:var(--black-100); }
    .sb-center { position:absolute; left:50%; transform:translateX(-50%); font-size:12px; font-weight:600; color:var(--black-100); }
    .sb-right  { margin-left:auto; display:flex; align-items:center; }

    /* ─── Header (APP Header / Internal) ─── */
    #header {
      background: transparent;
      flex-shrink: 0;
      margin-top: 16px;
    }
    #nav-row {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }
    #btn-back, #btn-close {
      width: 24px; height: 24px;
      border: none; background: transparent;
      cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #nav-title {
      /* [APP]/Title */
      font-family: var(--font);
      font-size: 16px;
      font-weight: 600;
      line-height: 20px;
      color: var(--blue-100);
      text-align: center;
      flex: 1;
    }
    #nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    #mesa-chip {
      display: inline-flex;
      align-items: center;
      background: transparent;
      border: 1px solid var(--coral-100);
      border-radius: 100px;
      padding: 4px 12px;
    }
    #mesa-chip span {
      font-size: 12px;
      font-weight: 500;
      color: var(--coral-100);
      line-height: 16px;
      white-space: nowrap;
    }

    /* ─── Search bar ─── */
    #search-bar-wrap {
      padding: 24px 16px 0;
      flex-shrink: 0;
    }
    #search-bar {
      background: var(--black-0);
      border-radius: 30px;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      box-shadow: var(--shadow-blue-8);
    }
    #search-input {
      flex: 1;
      border: none; outline: none;
      background: transparent;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 400;
      color: var(--black-100);
    }
    #search-input::placeholder {
      color: var(--black-60);
    }
    #btn-clear {
      display: none;
      border: none; background: transparent;
      padding: 0; cursor: pointer;
      flex-shrink: 0; line-height: 0;
    }

    /* ─── Category chips (horizontal scroll) ─── */
    #cats-wrap {
      flex-shrink: 0;
      padding: 12px 0 0;
    }
    #cats-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 0 16px 12px;
      scrollbar-width: none;
    }
    #cats-scroll::-webkit-scrollbar { display: none; }
    .cat-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 100px;
      padding: 7px 14px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      border: 2px solid transparent;
      flex-shrink: 0;
      transition: box-shadow .15s, border-color .15s;
      opacity: 0.5;
    }
    .cat-chip.active {
      opacity: 1;
      box-shadow: 0 2px 10px rgba(0,0,0,.14);
      border-color: rgba(0,0,0,.06);
    }

    /* ─── Products area ─── */
    #products-area {
      flex: 1;
      overflow-y: auto;
      padding: 4px 16px 12px;
      scrollbar-width: none;
    }
    #products-area::-webkit-scrollbar { display: none; }
    #products-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ─── Empty state ─── */
    #empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 0;
      color: var(--black-40);
      gap: 10px;
    }
    #empty-state p { font-size: 14px; font-weight: 500; }
    #empty-state small { font-size: 12px; font-weight: 400; color: var(--black-40); }

    /* ─── Product card ─── */
    .product-card {
      background: var(--black-0);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-blue-8);
      border-left: 4px solid transparent;
      display: flex;
      flex-direction: column;
      position: relative;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform .1s;
    }
    .product-card:active { transform: scale(0.96); }
    .product-card-inner {
      padding: 12px 10px 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }
    .product-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 4px;
    }
    .product-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--black-100);
      line-height: 18px;
      flex: 1;
    }
    .btn-star {
      width: 22px; height: 22px;
      border: none; background: transparent;
      padding: 0; cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 1px;
      -webkit-tap-highlight-color: transparent;
    }
    .product-price {
      font-size: 15px;
      font-weight: 700;
      color: var(--black-100);
      line-height: 20px;
    }

    /* ─── Scanner btn ─── */
    #btn-scan {
      border: none; background: transparent;
      padding: 0; cursor: pointer;
      flex-shrink: 0; line-height: 0;
    }

    /* ─── Scanner overlay ─── */
    #scanner-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,.82);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    #scanner-overlay.show { display: flex; }
    #scanner-viewfinder {
      width: 200px; height: 150px;
      border: 2px solid rgba(255,255,255,.35);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }
    #scanner-viewfinder::before,
    #scanner-viewfinder::after {
      content: '';
      position: absolute;
      width: 28px; height: 28px;
      border-color: #fff;
      border-style: solid;
    }
    #scanner-viewfinder::before {
      top: -1px; left: -1px;
      border-width: 3px 0 0 3px;
      border-radius: 14px 0 0 0;
    }
    #scanner-viewfinder::after {
      bottom: -1px; right: -1px;
      border-width: 0 3px 3px 0;
      border-radius: 0 0 14px 0;
    }
    .scanner-line {
      position: absolute;
      width: 80%; height: 2px;
      background: var(--coral-100);
      left: 10%; top: 20%;
      border-radius: 1px;
      animation: scan-move 1.6s ease-in-out infinite;
    }
    @keyframes scan-move {
      0%   { top: 20%; }
      50%  { top: 75%; }
      100% { top: 20%; }
    }
    #scanner-label {
      color: #fff;
      font-family: var(--font);
      font-size: 16px; font-weight: 500;
      text-align: center;
      line-height: 22px;
    }
    #scanner-hint {
      color: rgba(255,255,255,.55);
      font-family: var(--font);
      font-size: 13px; font-weight: 400;
      text-align: center;
      margin-top: -10px;
    }
    #btn-cancel-scan {
      border: none; background: transparent;
      color: #fff;
      font-family: var(--font);
      font-size: 16px; font-weight: 500;
      cursor: pointer;
      padding: 12px 32px;
      margin-top: 4px;
    }

    /* Quantity badge */
    .qty-badge {
      position: absolute;
      top: -8px; right: -8px;
      min-width: 22px; height: 22px;
      border-radius: 11px;
      background: var(--coral-100);
      color: #fff;
      font-family: var(--font);
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px;
      box-shadow: 0 2px 6px rgba(255,41,71,.4);
      z-index: 5;
    }

    /* ─── Bottom bar ─── */
    #bottom-bar {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      flex-shrink: 0;
      padding: 12px 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    #order-summary {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    #order-count {
      font-size: 12px;
      font-weight: 400;
      color: var(--black-60);
      line-height: 16px;
    }
    #order-total {
      font-size: 20px;
      font-weight: 700;
      color: var(--blue-100);
      line-height: 26px;
    }
    #btn-cobrar {
      height: 48px;
      padding: 0 32px;
      border-radius: var(--radius-pill);
      border: none;
      background: var(--coral-100);
      color: var(--black-0);
      font-family: var(--font);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,41,71,.35);
      transition: opacity .15s, box-shadow .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #btn-cobrar:disabled {
      opacity: 0.38;
      cursor: not-allowed;
      box-shadow: none;
    }
  </style>
</head>

<div id="app">

          <line x1="10" y1="8" x2="10" y2="16" stroke="#606060" stroke-width="1.5" stroke-linecap="round"/>

          <line x1="18.5" y1="8" x2="18.5" y2="16" stroke="#606060" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- SCANNER OVERLAY -->
  <div id="scanner-overlay" onclick="handleScanOverlayClick(event)">
    <span id="scanner-label">Escanea el código de barras</span>
    <div id="scanner-viewfinder">
      <div class="scanner-line"></div>
    </div>
    <span id="scanner-hint">Apunta la cámara al código del producto</span>
    <button id="btn-cancel-scan" onclick="closeScanner()">Cancelar</button>
  </div>

  <!-- CATEGORIES -->
  <div id="cats-wrap">
    <div id="cats-scroll"><!-- JS --></div>
  </div>

  <!-- PRODUCTS -->
  <div id="products-area">
    <div id="empty-state">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L21 21" stroke-linecap="round"/>
      </svg>
      <p>Sin resultados</p>
      <small>Intenta con otro nombre o categoría</small>
    </div>
    <div id="products-grid"><!-- JS --></div>
  </div>

  <!-- BOTTOM BAR -->
  <div id="bottom-bar">
    <div id="order-summary">
      <span id="order-count">0 productos</span>
      <span id="order-total">$0</span>
    </div>
    <button id="btn-cobrar" disabled onclick="goToCheckout()">Cobrar</button>
  </div>

</div><!-- /app -->

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let activeCategory = "entradas-frias";
let searchQuery    = "";
let favorites      = new Set();
let cart           = {}; // productId → qty
let currentMesaId  = null;

/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
function fmt(n) {
  return "$" + n.toLocaleString("es-CO");
}

function catById(id) {
  return CATEGORIES.find(c => c.id === id);
}

function starSVG(filled) {
  return `<svg width="16" height="16" viewBox="0 0 24 24"
    fill="${filled ? "#F59E0B" : "none"}"
    stroke="${filled ? "#F59E0B" : "#C8CAD4"}"
    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
  </svg>`;
}

/* ══════════════════════════════════════════
   CLOCK
══════════════════════════════════════════ */
function updateClock() {
  const d = new Date();
  document.getElementById("current-time").textContent =
    d.getHours().toString().padStart(2,"0") + ":" +
    d.getMinutes().toString().padStart(2,"0");
}

/* ══════════════════════════════════════════
   CATEGORIES
══════════════════════════════════════════ */
function renderCategories() {
  const wrap = document.getElementById("cats-scroll");
  wrap.innerHTML = "";

  CATEGORIES.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "cat-chip" + (cat.id === activeCategory ? " active" : "");
    btn.style.background = cat.bg;
    btn.style.color      = cat.color;

    let html = "";
    if (cat.id === "favoritos") {
      const hasFavs = favorites.size > 0;
      html += `<svg width="13" height="13" viewBox="0 0 24 24"
        fill="${hasFavs ? cat.color : "none"}"
        stroke="${cat.color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>`;
    }
    html += `<span>${cat.label}</span>`;
    if (cat.id === "favoritos" && favorites.size > 0) {
      html += `<span style="
        background:rgba(255,255,255,.22);
        border-radius:100px;
        padding:1px 7px;
        font-size:11px;
        font-weight:700;
      ">${favorites.size}</span>`;
    }
    btn.innerHTML = html;
    btn.addEventListener("click", () => switchCategory(cat.id));
    wrap.appendChild(btn);
  });
}

function switchCategory(id) {
  activeCategory = id;
  // clear search when switching category
  const inp = document.getElementById("search-input");
  if (inp.value) {
    inp.value = "";
    searchQuery = "";
    document.getElementById("btn-clear").style.display = "none";
  }
  renderCategories();
  renderProducts();
  // scroll category into view
  document.querySelector(`.cat-chip.active`)?.scrollIntoView({ behavior:"smooth", inline:"center", block:"nearest" });
}

/* ══════════════════════════════════════════
   PRODUCTS
══════════════════════════════════════════ */
function getVisible() {
  let list;
  if (activeCategory === "favoritos") {
    list = PRODUCTS.filter(p => favorites.has(p.id));
  } else {
    list = PRODUCTS.filter(p => p.cat === activeCategory);
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(p =>
      p.name.toLowerCase().includes(q) || p.id.toLowerCase().includes(q)
    );
  }
  return list;
}

function renderProducts() {
  const grid  = document.getElementById("products-grid");
  const empty = document.getElementById("empty-state");
  const list  = getVisible();

  grid.innerHTML = "";

  if (list.length === 0) {
    grid.style.display  = "none";
    empty.style.display = "flex";
    return;
  }
  grid.style.display  = "";
  empty.style.display = "none";

  list.forEach(product => {
    const cat = catById(product.cat) || CATEGORIES[1];
    const qty = cart[product.id] || 0;
    const fav = favorites.has(product.id);

    const card = document.createElement("div");
    card.className = "product-card";
    card.dataset.id = product.id;
    card.style.borderLeftColor = cat.color;

    card.innerHTML = `
      ${qty > 0 ? `<div class="qty-badge">${qty}</div>` : ""}
      <div class="product-card-inner">
        <div class="product-top">
          <span class="product-name">${product.name}</span>
          <button class="btn-star" data-id="${product.id}" aria-label="Favorito">
            ${starSVG(fav)}
          </button>
        </div>
        <div class="product-price">${fmt(product.price)}</div>
      </div>
    `;

    // Add to cart on card tap
    card.addEventListener("click", () => addToCart(product.id));

    // Star toggle — stop propagation so card click doesn't also fire
    card.querySelector(".btn-star").addEventListener("click", e => {
      e.stopPropagation();
      toggleFavorite(product.id);
    });

    grid.appendChild(card);
  });
}

/* ══════════════════════════════════════════
   FAVORITES
══════════════════════════════════════════ */
function toggleFavorite(id) {
  if (favorites.has(id)) {
    favorites.delete(id);
  } else {
    favorites.add(id);
  }
  renderCategories();
  renderProducts();
}

/* ══════════════════════════════════════════
   CART
══════════════════════════════════════════ */
function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  if (currentMesaId) {
    const product = PRODUCTS.find(p => p.id === id);
    if (product) {
      DataManager.agregarProducto(currentMesaId, {
        id: product.id,
        nombre: product.name,
        precio: product.price,
        categoria: product.cat,
      });
    }
  }
  syncCartBar();
  renderProducts();
}

function syncCartBar() {
  const totalQty = Object.values(cart).reduce((a, b) => a + b, 0);
  const totalAmt = Object.entries(cart).reduce((sum, [id, qty]) => {
    const p = PRODUCTS.find(x => x.id === id);
    return sum + (p ? p.price * qty : 0);
  }, 0);

  document.getElementById("order-count").textContent =
    totalQty === 0 ? "0 productos" : `${totalQty} producto${totalQty !== 1 ? "s" : ""}`;
  document.getElementById("order-total").textContent = fmt(totalAmt);
  document.getElementById("btn-cobrar").disabled = totalQty === 0;
}

/* ══════════════════════════════════════════
   SEARCH
══════════════════════════════════════════ */
function handleSearch(value) {
  searchQuery = value.trim();
  document.getElementById("btn-clear").style.display = value.length ? "block" : "none";
  renderProducts();
}

function clearSearch() {
  const inp = document.getElementById("search-input");
  inp.value = "";
  handleSearch("");
  inp.focus();
}

/* ══════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════ */
function goToCheckout() {
  if (currentMesaId) DataManager.solicitarCuenta(currentMesaId);
  location.href = "checkout.html";
}

/* ══════════════════════════════════════════
   SCANNER (simulado)
══════════════════════════════════════════ */
let scanTimer = null;

function openScanner() {
  document.getElementById("scanner-overlay").classList.add("show");
  // Simula encontrar un producto tras 2 segundos
  scanTimer = setTimeout(() => {
    closeScanner();
    simulateScan();
  }, 2000);
}

function closeScanner() {
  document.getElementById("scanner-overlay").classList.remove("show");
  if (scanTimer) { clearTimeout(scanTimer); scanTimer = null; }
}

function simulateScan() {
  const pool = activeCategory === "favoritos"
    ? PRODUCTS.filter(p => favorites.has(p.id))
    : PRODUCTS.filter(p => p.cat === activeCategory);
  const target = pool.find(p => !cart[p.id]) || pool[0];
  if (!target) return;
  addToCart(target.id);
  renderProducts();
}

function handleScanOverlayClick(e) {
  if (e.target === document.getElementById("scanner-overlay")) closeScanner();
}

/* ══════════════════════════════════════════
   INIT — leer params de URL
══════════════════════════════════════════ */
(function initFromURL() {
  DataManager.init();

  const p      = new URLSearchParams(location.search);
  const mesaId = p.get("mesa")   || "S03";
  const estado = p.get("estado") || "occupied";
  const zona   = p.get("zona")   || "salon";

  currentMesaId = mesaId;

  const zonaLabel = { salon:"Salón", terraza:"Terraza", barra:"Barra" };
  document.querySelector("#mesa-chip span").textContent =
    `Mesa ${mesaId} · ${zonaLabel[zona] || zona}`;

  // Chip verde si está disponible, coral si está ocupada (default)
  if (estado === "available") {
    const chip = document.getElementById("mesa-chip");
    chip.style.borderColor = "#10B981";
    chip.querySelector("span").style.color = "#10B981";
  }

  // Cargar productos existentes de la mesa desde localStorage
  const mesa = DataManager.getMesa(mesaId);
  if (mesa && mesa.productos && mesa.productos.length > 0) {
    mesa.productos.forEach(p => { cart[p.id] = p.cantidad; });
    syncCartBar();
  }
})();

updateClock();
setInterval(updateClock, 30000);
renderCategories();
renderProducts();
</script>
</body>
</html>

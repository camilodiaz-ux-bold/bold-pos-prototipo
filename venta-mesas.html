<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>BoldPOS — Venta Mesas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js"></script>
  <style>
    /* ─── Merlin Design Tokens ─── */
    :root {
      --blue-100:        #121e6c;
      --blue-30:         #babdd3;
      --blue-10:         #f1f2f6;
      --coral-100:       #ff2947;
      --black-0:         #ffffff;
      --black-40:        #969696;
      --black-60:        #606060;
      --black-100:       #1e1e1e;
      --background-page: #f7f8fb;
      --font:            'Montserrat', sans-serif;
      --shadow-card:     0px 4px 12px rgba(18,30,108,0.08);
      --gradient-brand:  linear-gradient(270deg,#95345b 13.86%,#4f2864 83.33%);

      /* Table status tokens */
      --avail-bg:     #EDEEF4;
      --avail-border: #BABDC8;
      --avail-chair:  #A8ADBE;
      --avail-num:    #6B7194;
      --avail-sub:    #8A8FA6;

      --occ-bg:       #FFF0F1;
      --occ-border:   #FF2947;
      --occ-chair:    #FF2947;
      --occ-num:      #FF2947;
      --occ-sub:      #6B7194;

      --bill-bg:      #FFFBE6;
      --bill-border:  #FFB800;
      --bill-chair:   #FFB800;
      --bill-num:     #92400E;
      --bill-sub:     #78350F;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: #d0d0d0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* ─── Phone shell ─── */
    #app {
      width: 393px;
      height: 100vh;
      background: var(--background-page);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ─── Status bar ─── */
    #status-bar {
      background: transparent;
      display: flex;
      align-items: center;
      padding: 8px 8px 0;
      flex-shrink: 0;
      position: relative;
    }
    .sb-left { display:flex; align-items:center; gap:4px; font-size:11px; font-weight:600; color:var(--black-100); }
    .sb-center { position:absolute; left:50%; transform:translateX(-50%); font-size:12px; font-weight:600; color:var(--black-100); }
    .sb-right { margin-left:auto; display:flex; align-items:center; }

    /* ─── Header ─── */
    #header {
      background: transparent;
      flex-shrink: 0;
      z-index: 10;
      margin-top: 16px;
      padding-bottom: 0;
    }
    #nav-row {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 0;
    }
    #btn-back {
      width: 24px; height: 24px;
      border: none; background: transparent;
      cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #nav-tabs-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    /* ─── Tabs pill (inside nav row) ─── */
    #tabs-pill {
      display: inline-flex;
      background: transparent;
      border-radius: 100px;
      gap: 4px;
    }
    .tab-btn {
      border: none; cursor: pointer;
      border-radius: 100px;
      padding: 8px 12px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      color: var(--blue-100);
      background: transparent;
      transition: background-color .15s, color .15s;
      white-space: nowrap;
      min-width: 120px;
      text-align: center;
    }
    .tab-btn.active {
      background: var(--blue-100);
      color: var(--black-0);
      font-weight: 400;
      box-shadow: 0px 4px 12px rgba(18,30,108,0.08);
    }

    /* ─── Search bar ─── */
    #search-bar-wrap {
      padding: 24px 16px 8px;
      background: var(--background-page);
      flex-shrink: 0;
    }
    #search-bar {
      background: var(--black-0);
      border-radius: 30px;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px 0 12px;
    }
    .search-placeholder {
      font-size: 14px;
      font-weight: 300;
      color: var(--black-60);
      line-height: 20px;
    }

    /* ─── Zone text tabs ─── */
    #zone-text-tabs {
      display: flex;
      gap: 16px;
      padding: 12px 16px 0;
      background: var(--background-page);
      flex-shrink: 0;
    }
    .zone-text-tab {
      border: none;
      background: transparent;
      cursor: pointer;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 400;
      color: var(--blue-100);
      padding: 0 0 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      line-height: 20px;
      white-space: nowrap;
    }
    .zone-text-tab.active {
      font-weight: 600;
    }
    .zone-tab-indicator {
      height: 2px;
      width: 100%;
      background: var(--blue-100);
      border-radius: 1px;
      visibility: hidden;
    }
    .zone-text-tab.active .zone-tab-indicator {
      visibility: visible;
    }

    /* Mostrador placeholder */
    #mostrador-view {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      padding-bottom: 24px;
    }
    .mostrador-icon {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: var(--gradient-brand);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(79,40,100,.25);
    }
    #mostrador-view h2 { font-size: 17px; font-weight: 700; color: var(--black-100); margin-top: 4px; }
    #mostrador-view p  { font-size: 13px; font-weight: 400; color: #9499B8; text-align: center; max-width: 230px; line-height: 1.5; }
    .btn-mostrador-new {
      margin-top: 12px;
      background: var(--coral-100);
      color: var(--black-0);
      border: none; border-radius: 100px;
      padding: 14px 36px;
      font-family: var(--font);
      font-weight: 500; font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,41,71,.3);
    }

    /* ─── Bottom panel ─── */

    /* ─── Search input ─── */
    #search-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 300;
      color: var(--black-100);
    }
    #search-input::placeholder {
      color: var(--black-60);
      font-weight: 300;
    }
    #btn-clear-search {
      display: none;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      flex-shrink: 0;
      line-height: 0;
    }
    /* ─── List view ─── */
    #list-view {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #FFFFFF;
      scrollbar-width: none;
    }
    #list-view::-webkit-scrollbar { display: none; }
    .list-card {
      border-radius: 12px;
      padding: 8px 16px;
      min-height: 76px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: default;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    .list-card.available { cursor: pointer; }
    .list-card-indicator { display: none; }
    .list-card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .list-card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2px;
    }
    .list-card-id {
      /* Montserrat Semibold 14px */
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      line-height: 20px;
    }
    .list-card-status {
      /* Montserrat Regular 12px — texto plano, sin pill */
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 400;
      line-height: 16px;
      white-space: nowrap;
    }
    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.6; }
    }
    .status-pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff2947;
      flex-shrink: 0;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }
    .list-card-meta {
      /* Montserrat Regular 12px */
      font-size: 12px;
      font-weight: 400;
      line-height: 16px;
    }
    .list-card-time {
      /* Montserrat Regular 12px */
      font-size: 12px;
      font-weight: 400;
      line-height: 16px;
    }
    .list-card-amount {
      /* Montserrat Medium 14px */
      font-size: 14px;
      font-weight: 500;
      line-height: 20px;
    }

    /* ─── Drop-up overlay ─── */
    #dropup-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 50;
      background: rgba(30,30,30,.62);
      flex-direction: column;
      justify-content: flex-end;
    }
    #dropup-overlay.show { display: flex; }
    #dropup-sheet {
      background: var(--black-0);
      border-radius: 32px 32px 0 0;
      box-shadow: 0px -4px 8px rgba(0,0,0,0.12);
      padding: 0 24px 32px;
    }
    .dropup-handle {
      width: 36px; height: 4px;
      background: #D1D3D9; border-radius: 2px;
      margin: 12px auto 24px;
    }
    #dropup-mesa-header {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 24px;
    }
    #dropup-mesa-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--blue-100);
      line-height: 24px;
    }
    #dropup-mesa-subtitle {
      font-size: 14px;
      font-weight: 400;
      color: var(--black-60);
      line-height: 20px;
    }
    #dropup-personas-label {
      font-size: 16px;
      font-weight: 600;
      color: var(--black-100);
      line-height: 22px;
      margin-bottom: 20px;
    }
    #picker-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      margin-bottom: 28px;
    }
    .picker-btn {
      width: 48px; height: 48px;
      border-radius: 24px; border: none;
      background: #EDEEF6; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #picker-count {
      font-size: 44px; font-weight: 800; color: var(--blue-100);
      min-width: 56px; text-align: center; line-height: 1;
    }
    #dropup-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #btn-confirm-dropup {
      height: 48px;
      border-radius: 100px;
      border: none;
      background: var(--coral-100);
      color: var(--black-0);
      font-family: var(--font);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,41,71,.3);
    }
    #btn-cancel-dropup {
      height: 44px;
      border: none;
      background: transparent;
      color: var(--black-60);
      font-family: var(--font);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
    }

    /* ─── Toast ─── */
    #toast {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      width: calc(100% - 32px);
      max-width: 361px;
      background: var(--black-100);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast-text {
      color: var(--black-0);
      font-size: 14px;
      font-weight: 500;
      line-height: 20px;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- STATUS BAR -->
  <div id="status-bar">
    <div class="sb-left">
      <svg width="17" height="10" viewBox="0 0 17 10" fill="none" aria-hidden="true">
        <rect x="0" y="6" width="3" height="4" rx="0.5" fill="#1e1e1e"/>
        <rect x="4.5" y="4" width="3" height="6" rx="0.5" fill="#1e1e1e"/>
        <rect x="9" y="2" width="3" height="8" rx="0.5" fill="#1e1e1e"/>
        <rect x="13.5" y="0" width="3" height="10" rx="0.5" fill="#1e1e1e"/>
      </svg>
      <svg width="16" height="11" viewBox="0 0 16 11" fill="none" aria-hidden="true">
        <path d="M8 8.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z" fill="#1e1e1e"/>
        <path d="M3.5 6a6.5 6.5 0 0 1 9 0" stroke="#1e1e1e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path d="M1 3.5a10 10 0 0 1 14 0" stroke="#1e1e1e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      </svg>
      <span>Carrier</span>
    </div>
    <div class="sb-center">9:41</div>
    <div class="sb-right">
      <svg width="27" height="12" viewBox="0 0 27 12" fill="none" aria-hidden="true">
        <rect x="0.5" y="0.5" width="22" height="11" rx="3.5" stroke="#1e1e1e" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="18" height="8" rx="2" fill="#1e1e1e"/>
        <path d="M23.5 4v4a2 2 0 0 0 0-4z" fill="#1e1e1e" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- HEADER -->
  <div id="header">
    <div id="nav-row">
      <button id="btn-back" aria-label="Volver" onclick="location.href='dashboard.html'">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M15 19l-7-7 7-7" stroke="#121e6c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div id="nav-tabs-wrap">
        <div id="tabs-pill">
          <button class="tab-btn active" data-tab="mesas"     onclick="switchTab('mesas')">Mesas</button>
          <button class="tab-btn"        data-tab="mostrador" onclick="switchTab('mostrador')">Mostrador</button>
        </div>
      </div>
      <div style="width:24px;flex-shrink:0;"></div>
    </div>
  </div>

  <!-- SEARCH BAR -->
  <div id="search-bar-wrap">
    <div id="search-bar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="flex-shrink:0;">
        <circle cx="11" cy="11" r="7" stroke="#606060" stroke-width="1.5" fill="none"/>
        <path d="M16.5 16.5L21 21" stroke="#606060" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input id="search-input" type="text" placeholder="Buscar mesa" oninput="filterTables(this.value)" autocomplete="off" />
      <button id="btn-clear-search" onclick="clearSearch()" aria-label="Limpiar búsqueda">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M4 4l10 10M14 4L4 14" stroke="#606060" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ZONE TEXT TABS -->
  <div id="zone-text-tabs">
    <button class="zone-text-tab active" data-zone="salon" onclick="switchZone('salon')">
      <span id="ztab-salon">Salón 7/16</span>
      <div class="zone-tab-indicator"></div>
    </button>
    <button class="zone-text-tab" data-zone="terraza" onclick="switchZone('terraza')">
      <span id="ztab-terraza">Terraza 4/6</span>
      <div class="zone-tab-indicator"></div>
    </button>
    <button class="zone-text-tab" data-zone="barra" onclick="switchZone('barra')">
      <span id="ztab-barra">Barra 1/2</span>
      <div class="zone-tab-indicator"></div>
    </button>
  </div>

  <!-- LIST VIEW -->
  <div id="list-view" style="display:flex;"></div>

  <!-- MOSTRADOR PLACEHOLDER -->
  <div id="mostrador-view">
    <div class="mostrador-icon">
      <svg width="36" height="36" viewBox="0 0 40 40" fill="none">
        <path d="M8 0H36C38.2 0 40 1.8 40 4V36C40 38.2 38.2 40 36 40H8C5.8 40 4 38.2 4 36V29C5.7 28.5 7 26.9 7 25C7 23.1 5.7 21.5 4 21V19C5.7 18.5 7 16.9 7 15C7 13.1 5.7 11.5 4 11V4C4 1.8 5.8 0 8 0Z" fill="rgba(255,255,255,0.25)"/>
        <rect x="10" y="11" width="24" height="3" rx="1.5" fill="white"/>
        <rect x="10" y="18" width="18" height="3" rx="1.5" fill="white"/>
        <rect x="10" y="25" width="13" height="3" rx="1.5" fill="white"/>
      </svg>
    </div>
    <h2>Venta Mostrador</h2>
    <p>Crea una orden directa sin asignar mesa al cliente</p>
    <button class="btn-mostrador-new">Nueva orden mostrador</button>
  </div>


  <!-- DROP-UP OVERLAY — solo para mesas disponibles -->
  <div id="dropup-overlay" onclick="handleOverlayClick(event)">
    <div id="dropup-sheet">
      <div class="dropup-handle"></div>
      <div id="dropup-mesa-header">
        <span id="dropup-mesa-title">Mesa S03</span>
        <span id="dropup-mesa-subtitle">Salón · Capacidad para 4</span>
      </div>
      <div id="dropup-personas-label">¿Cuántas personas?</div>
      <div id="picker-row">
        <button class="picker-btn" onclick="changePerson(-1)">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M4 10h12" stroke="#3E4983" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
        <span id="picker-count">2</span>
        <button class="picker-btn" onclick="changePerson(1)">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 4v12M4 10h12" stroke="#3E4983" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div id="dropup-actions">
        <button id="btn-confirm-dropup" onclick="confirmTable()">Abrir mesa</button>
        <button id="btn-cancel-dropup" onclick="closeDropUp()">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="12" cy="12" r="10" fill="#10B981"/>
      <path d="M7 12l3 3 7-7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span id="toast-text"></span>
  </div>

</div><!-- /app -->

<script src="data-manager.js"></script>
<script>

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let activeZone  = "salon";
let activeTab   = "mesas";
let searchQuery = "";

let selectedTable = null;
let personCount   = 2;

/* ══════════════════════════════════════════
   SEARCH FILTER
══════════════════════════════════════════ */
function filterTables(query) {
  searchQuery = query.trim().toLowerCase();
  document.getElementById("btn-clear-search").style.display = query.length ? "block" : "none";
  renderListView(activeZone, searchQuery);
}

function clearSearch() {
  const input = document.getElementById("search-input");
  input.value = "";
  filterTables("");
  input.focus();
}

/* ══════════════════════════════════════════
   LIST VIEW RENDERER
══════════════════════════════════════════ */
const STATUS_LABELS = {
  available:      "Disponible",
  occupied:       "Ocupada",
  bill_requested: "Cuenta solicitada",
  disabled:       "Inhabilitada",
};
const STATUS_TEXT_COLORS = {
  available:      "#1b8959",
  occupied:       "#ff2947",
  bill_requested: "#ff2947",
  disabled:       "#969696",
};
const STATUS_CARD_BG = {
  available:      "#f4fdf9",
  occupied:       "#fff2f4",
  bill_requested: "#fff2f4",
  disabled:       "#f3f3f3",
};
const STATUS_META_COLOR = {
  available:      "#1e1e1e",
  occupied:       "#1e1e1e",
  bill_requested: "#1e1e1e",
  disabled:       "#969696",
};
const STATUS_TIME_COLOR = {
  occupied:       "#606060",
  bill_requested: "#606060",
};

/* Datos mock exclusivos de la vista lista — no afectan el mapa */
const LIST_ZONES_DATA = {
  salon: {
    label: "Salón",
    tables: [
      { id:"S01", cap:2, status:"bill_requested", time:"2h 10min", amount:"$215.000" },
      { id:"S02", cap:2, status:"occupied",       time:"1h 45min", amount:"$28.000"  },
      { id:"S03", cap:4, status:"occupied",       time:"45min",    amount:"$42.000"  },
      { id:"S04", cap:4, status:"occupied",       time:"2h 20min", amount:"$87.500"  },
      { id:"S05", cap:4, status:"bill_requested", time:"3h 5min",  amount:"$195.000" },
      { id:"S06", cap:4, status:"available" },
      { id:"S07", cap:4, status:"available" },
      { id:"S08", cap:6, status:"available" },
      { id:"S09", cap:4, status:"available" },
      { id:"S10", cap:4, status:"available" },
      { id:"S11", cap:4, status:"available" },
      { id:"S12", cap:4, status:"available" },
      { id:"S13", cap:4, status:"available" },
      { id:"S14", cap:4, status:"available" },
      { id:"S15", cap:2, status:"disabled" },
      { id:"S16", cap:2, status:"disabled" },
    ]
  },
  terraza: {
    label: "Terraza",
    tables: [
      { id:"T01", cap:4, status:"available" },
      { id:"T02", cap:4, status:"available" },
      { id:"T03", cap:6, status:"occupied",       time:"35min",    amount:"$75.000"  },
      { id:"T04", cap:4, status:"available" },
      { id:"T05", cap:2, status:"bill_requested", time:"55min",    amount:"$65.000"  },
      { id:"T06", cap:6, status:"occupied",       time:"1h 20min", amount:"$112.000" },
    ]
  },
  barra: {
    label: "Barra",
    tables: [
      { id:"B01", cap:7, status:"available" },
      { id:"B02", cap:5, status:"occupied",       time:"2h 32min", amount:"$74.500"  },
    ]
  }
};

function renderListView(zoneKey, query) {
  const zone = LIST_ZONES_DATA[zoneKey];
  const listView = document.getElementById("list-view");
  listView.innerHTML = "";

  const q = (query || "").trim().toLowerCase();

  zone.tables.forEach(table => {
    if (q && !table.id.toLowerCase().includes(q)) return;

    const textColor = STATUS_TEXT_COLORS[table.status] || "#969696";
    const cardBg    = STATUS_CARD_BG[table.status]     || "#ffffff";
    const metaColor = STATUS_META_COLOR[table.status]  || "#1e1e1e";
    const timeColor = STATUS_TIME_COLOR[table.status]  || "#606060";
    const pulseDot  = table.status === "bill_requested"
      ? `<span class="status-pulse-dot"></span>` : "";

    const card = document.createElement("div");
    card.className = "list-card" + (table.status === "available" ? " available" : "");
    card.dataset.id = table.id;
    card.style.background = cardBg;

    card.innerHTML = `
      <div class="list-card-indicator"></div>
      <div class="list-card-body">
        <div class="list-card-row">
          <span class="list-card-id" style="color:${textColor};">${table.id}</span>
          <span class="list-card-status" style="color:${textColor};">${pulseDot}${STATUS_LABELS[table.status]}</span>
        </div>
        <div class="list-card-row">
          <span class="list-card-meta" style="color:${metaColor};">${table.cap} personas · ${zone.label}</span>
          ${table.time ? `<span class="list-card-time" style="color:${timeColor};">${table.time}</span>` : ""}
        </div>
        ${table.amount ? `<div class="list-card-row"><span></span><span class="list-card-amount" style="color:${textColor};">${table.amount}</span></div>` : ""}
      </div>
    `;

    card.addEventListener("click", () => handleTableTap(table));

    listView.appendChild(card);
  });
}

/* ══════════════════════════════════════════
   TAB SWITCHING
══════════════════════════════════════════ */
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));

  const mostradorV = document.getElementById("mostrador-view");
  const searchWrap = document.getElementById("search-bar-wrap");
  const zoneTabsEl = document.getElementById("zone-text-tabs");
  const listView   = document.getElementById("list-view");

  if (tab === "mesas") {
    if (searchWrap) searchWrap.style.display = "";
    if (zoneTabsEl) zoneTabsEl.style.display = "";
    mostradorV.style.display = "none";
    if (listView) listView.style.display = "flex";
    renderListView(activeZone, searchQuery);
  } else {
    if (searchWrap) searchWrap.style.display = "none";
    if (zoneTabsEl) zoneTabsEl.style.display = "none";
    if (listView)   listView.style.display   = "none";
    mostradorV.style.display = "flex";
  }
}

/* ══════════════════════════════════════════
   ZONE SWITCHING
══════════════════════════════════════════ */
function switchZone(key) {
  activeZone = key;
  document.querySelectorAll(".zone-text-tab").forEach(c => c.classList.toggle("active", c.dataset.zone === key));
  renderListView(key, searchQuery);
}

/* ══════════════════════════════════════════
   NAVEGACIÓN AL DETALLE
══════════════════════════════════════════ */
function goToDetalle(table, estado, personas) {
  const p = new URLSearchParams({ mesa: table.id, estado, zona: activeZone });
  if (personas) p.set("personas", personas);
  location.href = `detalle-pedido.html?${p.toString()}`;
}

/* ══════════════════════════════════════════
   DROP-UP (solo mesas disponibles)
══════════════════════════════════════════ */
function handleTableTap(table) {
  if (table.status === "available") {
    openDropUp(table);
  } else {
    goToDetalle(table, table.status);
  }
}

function openDropUp(table) {
  selectedTable = table;
  personCount   = Math.min(2, table.cap);
  const zone = LIST_ZONES_DATA[activeZone];
  document.getElementById("dropup-mesa-title").textContent    = `Mesa ${table.id}`;
  document.getElementById("dropup-mesa-subtitle").textContent = `${zone.label} · Capacidad para ${table.cap}`;
  document.getElementById("picker-count").textContent         = personCount;
  document.getElementById("dropup-overlay").classList.add("show");
}

function changePerson(delta) {
  if (!selectedTable) return;
  personCount = Math.min(Math.max(personCount + delta, 1), selectedTable.cap);
  document.getElementById("picker-count").textContent = personCount;
}

function closeDropUp() {
  document.getElementById("dropup-overlay").classList.remove("show");
  selectedTable = null;
}

function confirmTable() {
  if (!selectedTable) return;
  const table = selectedTable;
  const qty   = personCount;
  DataManager.abrirMesa(table.id, activeZone, table.cap, qty);
  closeDropUp();
  showToast(`Mesa ${table.id} abierta`);
  setTimeout(() => goToDetalle(table, "occupied", qty), 1400);
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById("dropup-overlay")) closeDropUp();
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
function showToast(msg) {
  const toast = document.getElementById("toast");
  document.getElementById("toast-text").textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 3000);
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
DataManager.init();
renderListView(activeZone, searchQuery);
</script>

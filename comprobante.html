<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>BoldPOS — Comprobante</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue:  #121e6c;
      --coral: #ff2947;
      --white: #ffffff;
      --black: #1e1e1e;
      --g60:   #606060;
      --bg:    #f7f8fb;
      --green: #6cdcab;
      --font:  'Montserrat', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: var(--font); background: #d0d0d0; display: flex; justify-content: center; align-items: flex-start; }

    /* ── Shell ── */
    #app { width: 393px; min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; }

    /* ── Status bar ── */
    #sb  { flex-shrink: 0; display: flex; align-items: center; padding: 8px 8px 0; }
    .sbl { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--black); }
    .sbr { margin-left: auto; display: flex; align-items: center; }

    /* ── Content ── */
    #content {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 40px;
      padding: 16px 16px 48px;
    }

    /* ── Receipt card ── */
    #receipt { width: 100%; display: flex; flex-direction: column; }

    /* Stub: solid blue strip with scalloped bottom edge (receipt aesthetic) */
    .receipt-stub {
      position: relative; height: 20px;
      background: var(--blue); border-radius: 8px 8px 0 0;
    }
    .receipt-stub::after {
      content: ''; position: absolute;
      bottom: -8px; left: -8px; right: -8px; height: 16px;
      background: radial-gradient(circle at 8px 0px, var(--bg) 8px, transparent 8px) 0 0 / 16px 16px repeat-x;
    }

    /* Receipt body — Figma: white rounded-bl-16 rounded-br-16 pad 24/16 gap 36 shadow */
    .receipt-body {
      background: var(--white);
      border-radius: 0 0 16px 16px;
      box-shadow: 0px 8px 10px rgba(18,30,108,0.08);
      padding: 28px 16px 24px; /* extra top pad to clear scallop overlap */
      display: flex; flex-direction: column; gap: 36px;
    }

    /* ── Receipt header ── */
    .r-header { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    /* App/Subtitle: Bold 16px lh24 Black/100 */
    .r-title  { font-size: 16px; font-weight: 700; color: var(--black); line-height: 24px; text-align: center; }
    /* Numeric/Small/Semibold: 32px 600 Blue/100 lh40 */
    .r-amount { font-size: 32px; font-weight: 600; color: var(--blue); line-height: 40px; text-align: center; }
    /* Caption/Regular: 12px 400 Black/60 */
    .r-dt     { font-size: 12px; font-weight: 400; color: var(--g60); line-height: 16px; text-align: center; margin-top: 2px; }

    /* ── Info section ── */
    .r-info { display: flex; flex-direction: column; gap: 16px; }
    .info-group { display: flex; flex-direction: column; gap: 8px; }
    .info-row   { display: flex; align-items: flex-start; gap: 8px; min-height: 16px; }
    /* Caption/Regular */
    .info-lbl { flex: 1; min-width: 0; font-size: 12px; font-weight: 400; color: var(--black); line-height: 16px; }
    /* Caption/Medium */
    .info-val { font-size: 12px; font-weight: 500; color: var(--black); line-height: 16px; text-align: right; white-space: nowrap; }
    /* Caption/Bold — Total row */
    .info-row.bold .info-lbl,
    .info-row.bold .info-val { font-weight: 700; }

    .r-divider { height: 1px; background: #EEF0F8; }

    /* ── Actions ── */
    #actions { width: 100%; display: flex; flex-direction: column; align-items: center; }
    /* App/Body/bold: Bold 14px Blue/100 */
    .a-title { font-size: 14px; font-weight: 700; color: var(--blue); line-height: 20px; text-align: center; }
    .a-btns  { display: flex; gap: 8px; width: 100%; padding: 24px 0; }

    /* Coral button (Correo / WhatsApp) */
    .btn-send {
      flex: 1; height: 48px; border-radius: 100px;
      border: none; background: var(--coral); color: var(--white);
      font-family: var(--font); font-size: 14px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      -webkit-tap-highlight-color: transparent; transition: opacity .15s;
    }
    .btn-send:active { opacity: .85; }

    /* "Nueva venta" — white bg, coral text */
    .btn-nueva {
      width: 100%; height: 48px; border-radius: 100px;
      border: none; background: var(--white);
      font-family: var(--font); font-size: 14px; font-weight: 700; color: var(--coral);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; transition: opacity .15s;
    }
    .btn-nueva:active { opacity: .75; }
  </style>
</head>
<body>
<div id="app">

  <!-- Status bar -->
  <div id="sb">
    <div class="sbl"><span id="sb-time">9:41</span></div>
    <div class="sbr">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="8" width="3" height="4" rx="1" fill="#1e1e1e"/>
        <rect x="4.5" y="5.5" width="3" height="6.5" rx="1" fill="#1e1e1e"/>
        <rect x="9" y="3" width="3" height="9" rx="1" fill="#1e1e1e"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="#1e1e1e"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none" style="margin-left:5px">
        <path d="M8 9.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5z" fill="#1e1e1e"/>
        <path d="M8 6.5C9.66 6.5 11.16 7.17 12.25 8.25L13.31 7.19A7 7 0 0 0 8 5a7 7 0 0 0-5.31 2.19l1.06 1.06A5 5 0 0 1 8 6.5z" fill="#1e1e1e"/>
        <path d="M8 3.5c2.48 0 4.73 1 6.36 2.63l1.06-1.06A9.95 9.95 0 0 0 8 2a9.95 9.95 0 0 0-7.42 3.07L1.64 6.13A8 8 0 0 1 8 3.5z" fill="#1e1e1e"/>
      </svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none" style="margin-left:5px">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#1e1e1e" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="16" height="8" rx="2" fill="#1e1e1e"/>
        <path d="M23 4v4a2 2 0 0 0 0-4z" fill="#1e1e1e" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Content -->
  <div id="content">

    <!-- Receipt card — Figma 26793:110026 -->
    <div id="receipt">
      <!-- Stub: blue bar with scalloped bottom edge -->
      <div class="receipt-stub"></div>

      <div class="receipt-body">

        <!-- Header: checkmark icon + title + amount + datetime -->
        <div class="r-header">
          <!-- Feedback/Success icon: green circle + white checkmark — 40px -->
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
            <circle cx="20" cy="20" r="20" fill="#6CDCAB"/>
            <path d="M11 20l6 6 12-12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <p class="r-title">¡Completaste una venta!</p>
          <div>
            <p class="r-amount" id="r-total">$0</p>
            <p class="r-dt"    id="r-dt">—</p>
          </div>
        </div>

        <!-- Info section -->
        <div class="r-info">

          <!-- Cliente + Mesero -->
          <div class="info-group">
            <div class="info-row">
              <span class="info-lbl">Cliente</span>
              <span class="info-val">Consumidor Final</span>
            </div>
            <div class="info-row">
              <span class="info-lbl">Mesero</span>
              <span class="info-val" id="r-mesero">—</span>
            </div>
          </div>

          <div class="r-divider"></div>

          <!-- Sale info -->
          <div class="info-group">
            <div class="info-row">
              <span class="info-lbl">Venta No</span>
              <span class="info-val" id="r-no">—</span>
            </div>
            <div class="info-row">
              <span class="info-lbl">Sucursal</span>
              <span class="info-val">Principal</span>
            </div>
            <div class="info-row">
              <span class="info-lbl">Emitido por</span>
              <span class="info-val">Restaurante Andrés</span>
            </div>
            <div class="info-row">
              <span class="info-lbl">Restaurante Andrés</span>
              <span class="info-val">NIT: 900.000.000-0</span>
            </div>
            <div class="info-row">
              <span class="info-lbl">Método de pago</span>
              <span class="info-val" id="r-method">—</span>
            </div>
            <div class="info-row">
              <span class="info-lbl">Notas</span>
              <span class="info-val">-</span>
            </div>
          </div>

          <div class="r-divider"></div>

          <!-- Totals -->
          <div class="info-group">
            <div class="info-row">
              <span class="info-lbl">Subtotal</span>
              <span class="info-val" id="r-sub">$0</span>
            </div>
            <div class="info-row">
              <span class="info-lbl">Impuesto</span>
              <span class="info-val" id="r-tax">$0</span>
            </div>
            <div class="info-row">
              <span class="info-lbl">Descuento</span>
              <span class="info-val">$0</span>
            </div>
            <div class="info-row" id="r-tip-row" style="display:none">
              <span class="info-lbl" id="r-tip-lbl">Propina</span>
              <span class="info-val" id="r-tip-val">$0</span>
            </div>
            <div class="info-row bold">
              <span class="info-lbl">Total de la venta</span>
              <span class="info-val" id="r-total-b">$0</span>
            </div>
          </div>

        </div><!-- /r-info -->
      </div><!-- /receipt-body -->
    </div><!-- /receipt -->

    <!-- Actions — Figma 26793:110086 -->
    <div id="actions">
      <p class="a-title">Enviar recibo por:</p>
      <div class="a-btns">
        <!-- Correo -->
        <button class="btn-send" onclick="showToast('Próximamente: enviar por correo')">
          Correo
        </button>
        <!-- WhatsApp -->
        <button class="btn-send" onclick="showToast('Próximamente: enviar por WhatsApp')">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="11.5" fill="white"/>
            <path d="M12 3a9 9 0 0 0-7.74 13.6L3 21l4.5-1.26A9 9 0 1 0 12 3z" fill="#25D366"/>
            <path d="M9.4 8.4c-.2-.4-.4-.4-.6-.4-.15 0-.3 0-.46.2-.2.2-.75.73-.75 1.78 0 1.05.77 2.06.87 2.2.1.14 1.5 2.38 3.68 3.24.5.2.9.32 1.2.41.5.16.96.14 1.32.08.4-.07 1.24-.5 1.42-.98.18-.48.18-.9.12-1-.05-.08-.2-.14-.42-.25-.22-.11-1.3-.64-1.5-.71-.2-.07-.35-.1-.5.1-.14.2-.56.7-.68.85-.13.14-.25.16-.47.05-.22-.1-1.13-.42-2.15-1.33-.8-.7-1.33-1.57-1.49-1.84-.16-.27-.02-.42.12-.56l.38-.44c.13-.14.17-.27.26-.42.08-.15 0-.3-.06-.41L9.4 8.4z" fill="white"/>
          </svg>
          WhatsApp
        </button>
      </div>
      <!-- Nueva venta — Figma: white bg coral text 48px radius-100 -->
      <button class="btn-nueva" onclick="nuevaVenta()">Nueva venta</button>
    </div>

  </div><!-- /content -->
</div><!-- /app -->

<script src="data-manager.js"></script>
<script>
/* ── URL params ── */
const qp        = new URLSearchParams(location.search);
const mesaId    = qp.get('mesa')     || 'S05';
const zona      = qp.get('zona')     || 'salon';
const totalVal  = parseFloat(qp.get('total'))    || 0;
const subVal    = parseFloat(qp.get('subtotal')) || 0;
const taxVal    = parseFloat(qp.get('tax'))      || 0;
const tipVal    = parseFloat(qp.get('tip'))      || 0;
const methods   = (qp.get('method') || '').split(',').filter(Boolean);
const mesero    = qp.get('mesero')   || 'Carlos Mendez';

/* ── Method names ── */
const MNAMES = {
  bold:'Bold', efectivo:'Efectivo', nequi:'Nequi', daviplata:'Daviplata',
  credibanco:'Credibanco', redeban:'Redeban', addi:'Addi', sistecredito:'Sistecredito',
  otro:'Otro', transferencia:'Transferencia bancaria', intercambio:'Intercambio',
  pago_contra_entrega:'Pago contra entrega'
};
const mName = k => MNAMES[k] || k;
const fmt   = n => '$' + Math.round(n || 0).toLocaleString('es-CO');

/* ── Format datetime ── */
function fmtDt(d) {
  const p = n => String(n).padStart(2,'0');
  return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} - ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

/* ── Init ── */
(function init() {
  try { DataManager.init(); } catch(e) {}
  const now = new Date();

  document.getElementById('sb-time').textContent = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
  document.getElementById('r-total').textContent  = fmt(totalVal);
  document.getElementById('r-total-b').textContent = fmt(totalVal);
  document.getElementById('r-dt').textContent     = fmtDt(now);
  document.getElementById('r-sub').textContent    = fmt(subVal);
  document.getElementById('r-tax').textContent    = fmt(taxVal);
  document.getElementById('r-no').textContent     = String(Math.floor(Math.random() * 9000) + 1000);
  document.getElementById('r-mesero').textContent = mesero;

  /* Propina row */
  if (tipVal > 0) {
    document.getElementById('r-tip-row').style.display = '';
    document.getElementById('r-tip-val').textContent   = fmt(tipVal);
    const pct = subVal > 0 ? Math.round(tipVal / subVal * 100) : 0;
    document.getElementById('r-tip-lbl').textContent   = pct ? `Propina ${pct}%` : 'Propina';
  }

  /* Payment method(s) */
  document.getElementById('r-method').textContent =
    methods.length > 0 ? methods.map(mName).join(', ') : '—';
})();

/* ── Nueva venta: release mesa and go back ── */
function nuevaVenta() {
  try {
    DataManager.cerrarMesa(mesaId);
    localStorage.removeItem('mesa_'           + mesaId);
    localStorage.removeItem('boldPOS_comanda_' + mesaId);
  } catch(e) {}
  location.href = 'venta-mesas.html?zona=' + encodeURIComponent(zona);
}

/* ── Toast ── */
function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    Object.assign(t.style, {
      position:'fixed', bottom:'80px', left:'50%',
      transform:'translateX(-50%) translateY(8px)',
      width:'calc(100% - 32px)', maxWidth:'361px',
      background:'#1e1e1e', borderRadius:'12px', padding:'12px 16px',
      color:'#fff', fontSize:'14px', fontWeight:'500', lineHeight:'20px',
      zIndex:'9999', opacity:'0', pointerEvents:'none',
      transition:'opacity .25s, transform .25s', fontFamily:"'Montserrat', sans-serif"
    });
    document.getElementById('app').appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._tid);
  t._tid = setTimeout(() => {
    t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(8px)';
  }, 3000);
}
</script>
</body>
</html>
